let _h2pLoading;
function ensureHtml2pdf(){
  if(window.html2pdf) return Promise.resolve();
  if(_h2pLoading) return _h2pLoading;
  _h2pLoading=new Promise((res,rej)=>{
    const sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    sc.onload=()=>res(); sc.onerror=()=>rej(new Error('load failed'));
    document.head.appendChild(sc);
  });
  return _h2pLoading;
}
function downloadBlob(blob,name){
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}
function openPdfPreview(c){
  ensureHtml2pdf().catch(()=>{});
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="pdf-modal">
    <div class="pdf-bar">
      <button class="cls" id="pdfClose">Закрыть</button>
      <span class="ttl">Предпросмотр карты</span>
      <button class="btn btn-primary btn-sm" id="pdfShare">⤴ Поделиться</button>
    </div>
    <div class="pdf-scroll">${clientDocFragment(c)}</div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.onclick=e=>{ if(e.target===ov) close(); };
  ov.querySelector('#pdfClose').onclick=close;
  ov.querySelector('#pdfShare').onclick=()=>sharePdf(c, ov);
}
async function sharePdf(c, ov){
  const btn=ov&&ov.querySelector('#pdfShare'); if(btn){ btn.disabled=true; btn.textContent='Собираю…'; }
  toast('Собираю PDF…');
  let ok=true;
  try{ await ensureHtml2pdf(); }catch(e){ ok=false; }
  if(!ok || !window.html2pdf){ if(ov)ov.remove(); printClientDoc(c); return; }
  const root=document.createElement('div');
  root.innerHTML=clientDocFragment(c);
  root.style.cssText='position:fixed;left:-10000px;top:0;width:740px;background:#fff;z-index:-1;';
  document.body.appendChild(root);
  try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready; }catch(e){}
  const name='karta-'+(initials(c.name).replace(/\s/g,'')||'klient')+'-'+today()+'.pdf';
  try{
    const blob=await window.html2pdf().set({margin:[10,9,12,9],image:{type:'jpeg',quality:0.97},
      html2canvas:{scale:2,backgroundColor:'#ffffff',useCORS:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy']}})
      .from(root.querySelector('.pd-page')).outputPdf('blob');
    const file=new File([blob], name, {type:'application/pdf'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:'Карта клиента'}); }
      catch(err){ if(!(err&&err.name==='AbortError')){ downloadBlob(blob,name); toast('Файл сохранён в Загрузки'); } }
    } else { downloadBlob(blob,name); toast('Файл сохранён в Загрузки'); }
  }catch(e){ console.error('pdf',e); printClientDoc(c); }
  finally{ setTimeout(()=>{try{root.remove();}catch(e){}},500); if(ov) ov.remove(); }
}
function printClientDoc(c){
  const html='<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><title>Карта клиента — '+esc(c.name)+'</title><style>@page{margin:14mm 12mm;}body{margin:0;}</style><link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"></head><body>'+clientDocFragment(c)+'</body></html>';
  const iframe=document.createElement('iframe');
  iframe.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;opacity:0;';
  document.body.appendChild(iframe);
  try{
    const d=iframe.contentWindow.document; d.open(); d.write(html); d.close();
    setTimeout(()=>{ try{ iframe.contentWindow.focus(); iframe.contentWindow.print(); }catch(e){ toast('На iPad: «Поделиться» → «Печать», затем «Сохранить в PDF».'); }
      setTimeout(()=>{try{iframe.remove();}catch(e){}},60000); },500);
  }catch(e){ toast('Не удалось сформировать PDF'); try{iframe.remove();}catch(_){ } }
}

/* ---- backup ---- */
async function exportData(){
  const dump={version:3,exported:new Date().toISOString(),clients:state.clients,exercises:state.exercises,sessions:state.sessions,courses:state.courses,payMarks:state.payMarks,receipts:state.receipts};
  const blob=new Blob([JSON.stringify(dump,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='50minut-backup-'+today()+'.json'; a.click(); URL.revokeObjectURL(a.href);
  state.lastBackup=new Date().toISOString(); await sSet('lastBackup',state.lastBackup);
  updateBackupLabel(); toast('Резервная копия сохранена');
}
function importData(ev){
  const file=ev.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d.clients) throw new Error();
      if(!(await confirmModal('Заменить все текущие данные данными из файла?'))) return;
      state.clients=d.clients||[]; state.exercises=d.exercises||[]; state.sessions=d.sessions||{};
      state.courses=d.courses||[]; state.payMarks=d.payMarks||{}; state.receipts=d.receipts||{};
      await sSet('clients',state.clients); await sSet('exercises',state.exercises);
      await sSet('courses',state.courses); await sSet('payMarks',state.payMarks); await sSet('receipts',state.receipts);
      for(const c of state.clients){ await sSet('sessions:'+c.id, state.sessions[c.id]||[]); }
      go('today'); toast('Данные загружены');
    }catch(e){ toast('Не удалось прочитать файл'); }
  };
  r.readAsText(file); ev.target.value='';
}
function updateBackupLabel(){
  const el=document.getElementById('backupLabel'); if(!el) return;
  if(state.lastBackup){
    const d=new Date(state.lastBackup);
    el.textContent='копия от '+d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  } else el.textContent='копия ещё не создавалась';
}

async function applyExerciseSeed(){
  const applied = await sGet('exerciseSeedApplied') || {};
  let changed=false;
  for(const ex of extraExercises()){
    if(applied[ex.key]) continue;
    if(!state.exercises.some(e=>e.title===ex.title)){
      state.exercises.push({id:uid(), title:ex.title, category:ex.category, body:ex.body});
      changed=true;
    }
    applied[ex.key]=true;
  }
  if(changed) await sSet('exercises', state.exercises);
  await sSet('exerciseSeedApplied', applied);
}
