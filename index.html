function layoutModeMap(m, nodes){
  const stage=m.querySelector('#mcStage'), canvas=m.querySelector('#mcCanvas');
  if(!stage||!canvas) return;
  const els=[...canvas.querySelectorAll('.mc-node')];
  const W=900, H=900; canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const cols=Math.ceil(Math.sqrt(nodes.length)), gapx=210, gapy=170;
  const startX=W/2-(cols-1)*gapx/2, startY=H/2-(Math.ceil(nodes.length/cols)-1)*gapy/2;
  const pos=nodes.map((_,i)=>({x:startX+(i%cols)*gapx, y:startY+Math.floor(i/cols)*gapy}));
  const sizes=nodes.map(()=>5); // 1..10, по умолчанию 5
  // размер кружка в пикселях по «уровню» 1..10
  const px=lvl=>56+(lvl-1)*16; // 56..200
  function sizeEl(i){ const d=px(sizes[i]); const el=els[i];
    el.style.width=d+'px'; el.style.height=d+'px'; el.style.margin=(-d/2)+'px 0 0 '+(-d/2)+'px';
    el.style.fontSize=Math.max(10,Math.min(15, d/9))+'px';
    const b=el.querySelector('.mc-szbadge'); if(b) b.textContent=sizes[i];
  }
  els.forEach((el,i)=>{ el.style.left=pos[i].x+'px'; el.style.top=pos[i].y+'px'; sizeEl(i); });
  // доска: центрируем (фиксированный масштаб, общий зум убран)
  let scale=0.62, ox=0, oy=0;
  function apply(){ canvas.style.transform=`translate(${ox}px,${oy}px) scale(${scale})`; }
  const sb=stage.getBoundingClientRect();
  ox=sb.width/2 - (W/2)*scale; oy=sb.height/2 - (H/2)*scale; apply();
  // выбор кружка → показать кнопки − / +
  let selected=-1;
  function clearSel(){ els.forEach(el=>el.classList.remove('sel')); const c=m.querySelector('.mc-sizer'); if(c) c.remove(); selected=-1; }
  function showSizer(i){
    clearSel(); selected=i; els[i].classList.add('sel');
    const bar=document.createElement('div'); bar.className='mc-sizer';
    bar.innerHTML=`<button class="mc-sz" id="szMinus">−</button>
      <span class="mc-sz-lab"><b class="mc-sz-val">${sizes[i]}</b><span>размер</span></span>
      <button class="mc-sz" id="szPlus">+</button>`;
    stage.appendChild(bar);
    const upd=()=>{ sizeEl(i); bar.querySelector('.mc-sz-val').textContent=sizes[i]; };
    bar.querySelector('#szMinus').onclick=()=>{ sizes[i]=Math.max(1,sizes[i]-1); upd(); };
    bar.querySelector('#szPlus').onclick=()=>{ sizes[i]=Math.min(10,sizes[i]+1); upd(); };
  }
  // перетаскивание узлов + тап = выбрать
  let drag=null;
  els.forEach((el,i)=>{
    el.addEventListener('pointerdown',e=>{ e.stopPropagation(); el.setPointerCapture(e.pointerId);
      drag={el,i,sx:e.clientX,sy:e.clientY,ox:pos[i].x,oy:pos[i].y,moved:false}; el.style.zIndex=10; });
    el.addEventListener('pointermove',e=>{ if(!drag||drag.el!==el)return;
      const dx=e.clientX-drag.sx, dy=e.clientY-drag.sy;
      if(Math.abs(dx)+Math.abs(dy)>4) drag.moved=true;
      pos[i].x=drag.ox+dx/scale; pos[i].y=drag.oy+dy/scale;
      el.style.left=pos[i].x+'px'; el.style.top=pos[i].y+'px'; });
    el.addEventListener('pointerup',e=>{ if(drag&&drag.el===el){ el.style.zIndex=''; if(!drag.moved){ selected===i?clearSel():showSizer(i); } drag=null; } });
  });
  // панорама по фону (тап по фону снимает выбор)
  let pan=null; const pts=new Map();
  stage.addEventListener('pointerdown',e=>{ if(e.target.closest('.mc-node')||e.target.closest('.mc-sizer'))return;
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===1){ pan={sx:e.clientX,sy:e.clientY,ox,oy,moved:false}; }
  });
  stage.addEventListener('pointermove',e=>{ if(!pts.has(e.pointerId)||!pan)return;
    if(Math.abs(e.clientX-pan.sx)+Math.abs(e.clientY-pan.sy)>4) pan.moved=true;
    ox=pan.ox+(e.clientX-pan.sx); oy=pan.oy+(e.clientY-pan.sy); apply();
  });
  const end=e=>{ if(pan&&!pan.moved&&!e.target.closest('.mc-node')&&!e.target.closest('.mc-sizer')) clearSel(); pts.delete(e.pointerId); if(pts.size===0)pan=null; };
  stage.addEventListener('pointerup',end); stage.addEventListener('pointercancel',end);
}

      const pr=await CLOUD.pull();
      if(pr.ok && !pr.empty){ await reloadState(); toast('Данные загружены из облака'); }

  };
  const offBtn=ov.querySelector('#cloudOffBtn'); if(offBtn) offBtn.onclick=async()=>{
    await CLOUD.disable(); try{ localStorage.removeItem('cloudPass'); sessionStorage.removeItem('cloudPass'); }catch(e){} updateCloudLabel(); ov.remove(); toast('Синхронизация отключена');
  };
}

function nextExtraDate(c){
  if(!c||!c.extraDates||!c.extraDates.length) return '';
  const todayKey=today();
  const future=c.extraDates.filter(d=>d>=todayKey).sort();
  return future[0] || c.extraDates.slice().sort().pop() || '';
}
function nextExtraTime(c){
  const d=nextExtraDate(c); if(!d) return '';
  return (c.extraTimes && c.extraTimes[d]) || '';
}
function setNextExtraDate(c, dateKey, timeVal){
  c.extraDates=c.extraDates||[]; c.extraTimes=c.extraTimes||{};
  const prev=nextExtraDate(c);
  if(!dateKey){
    // дату очистили — убираем прежнюю запланированную будущую дату
    if(prev){ c.extraDates=c.extraDates.filter(d=>d!==prev); delete c.extraTimes[prev]; }
    return;
  }
  // если меняем ранее заданную будущую дату — заменим её
  if(prev && prev!==dateKey && prev>=today()){ c.extraDates=c.extraDates.filter(d=>d!==prev); delete c.extraTimes[prev]; }
  if(!c.extraDates.includes(dateKey)) c.extraDates.push(dateKey);
  if(timeVal) c.extraTimes[dateKey]=timeVal; else delete c.extraTimes[dateKey];
}

function pull(){ // read text fields into state before a re-render

  const nt=g('f_notes'); if(nt!==undefined) s.notes=nt;

async function saveSession(){
  pull(); const s=state.editing;
  const existing = state.sessions[state.clientId] && state.sessions[state.clientId].find(x=>x.id===s.id);
  const wasNew = !existing;
  const becameHeld = existing && existing.planned && !s.planned; // запланированная стала состоявшейся
  delete s._saved;
  const arr=state.sessions[state.clientId]=state.sessions[state.clientId]||[];
  const idx=arr.findIndex(x=>x.id===s.id);
  if(idx>=0) arr[idx]=s; else arr.push(s);
  await sSet('sessions:'+state.clientId, arr);
  // списать предоплату за состоявшуюся сессию (новую или превратившуюся из запланированной), не для planned
  const c=clientById(state.clientId);
  const counts = !s.planned && (wasNew || becameHeld);
  if(counts && c.payType==='pre' && s.arrival!=='noshow' && (Number(c.prepaid)||0)>0){
    c.prepaid=Number(c.prepaid)-1; await sSet('clients',state.clients);
    if(c.prepaid<=0) toast('Сессия сохранена · предоплата закончилась ❗');
    else toast('Сессия сохранена · осталось '+c.prepaid+' опл.');
  } else {
    toast(s.planned?'Запланированная сессия сохранена':'Сессия сохранена');
  }
  state.tab='sessions'; go('client',state.clientId);
}

/* ---- next (future) session helpers ---- */
// дата следующей сессии: ближайшая будущая по расписанию, иначе +7 дней от текущей
function nextSessionDate(c, fromSession){
  const base = fromSession && fromSession.date ? new Date(fromSession.date+'T00:00:00') : new Date();
  base.setHours(0,0,0,0);
  if(c.slot){
    const d=new Date(base); d.setDate(d.getDate()+1);
    for(let i=0;i<14;i++){ if(d.getDay()===c.slot.weekday) return dateKeyOf(d); d.setDate(d.getDate()+1); }
  }
  const d=new Date(base); d.setDate(d.getDate()+7); return dateKeyOf(d);
}
async function createFutureSession(c, fromSession, planText){
  const arr=state.sessions[c.id]=state.sessions[c.id]||[];
  const date=nextSessionDate(c, fromSession);
  // если уже есть запланированная сессия на эту дату — дополним её план, не дублируем
  let fut=arr.find(x=>x.date===date && x.planned);
  if(fut){
    fut.notes = (fut.notes? fut.notes.trim()+'\n\n':'') + planText;
  } else {
    fut={ id:uid(), date, planned:true, arrival:'ontime', mood:null, risk:'none',
      keyPoints:'', notes:planText, summary:'', homework:'', nextTime:'' };
    arr.push(fut);
  }
  await sSet('sessions:'+c.id, arr);
}

  document.querySelectorAll('[data-exfilter]').forEach(b=>b.onclick=()=>{ state.exFilter=b.dataset.exfilter; render(); });

  // режим выбора: отметка карточек
  document.querySelectorAll('[data-pick]').forEach(card=>card.onclick=()=>{
    const id=card.dataset.pick; const ch=state.exChosen||(state.exChosen=new Set());
    ch.has(id)?ch.delete(id):ch.add(id); render();
  });
  const seEdit=document.getElementById('exSelEdit'); if(seEdit) seEdit.onclick=()=>{
    const ids=[...(state.exChosen||[])]; if(ids.length!==1) return;
    const ex=state.exercises.find(e=>e.id===ids[0]); state.exSelect=false; state.exChosen=new Set(); render(); openExModal(ex);
  };
  const seDel=document.getElementById('exSelDel'); if(seDel) seDel.onclick=async()=>{
    const ids=[...(state.exChosen||[])]; if(!ids.length) return;
    if(!(await confirmModal('Удалить выбранные упражнения ('+ids.length+')?', true))) return;
    state.exercises=state.exercises.filter(e=>!ids.includes(e.id)); await sSet('exercises',state.exercises);
    state.exSelect=false; state.exChosen=new Set(); render();
  };

  // обычный режим: тап редактирует обычное упражнение
  document.querySelectorAll('[data-edit-ex]').forEach(card=>card.onclick=()=>openExModal(state.exercises.find(e=>e.id===card.dataset.editEx)));
  // обычный режим: тап открывает интерактив
  document.querySelectorAll('[data-open-inter]').forEach(card=>card.onclick=()=>{
    const kind=card.dataset.openInter;
    const cb=txt=>{ navigator.clipboard&&navigator.clipboard.writeText(txt).catch(()=>{}); toast('Скопировано. Чтобы сохранить в сессию — открой через «＋ Упражнения» в сессии.'); };
    if(kind==='breath478') return openBreath478();
    if(kind==='grounding54321') return openGrounding54321();
    if(kind.startsWith('quad:')) return openQuadrant(kind.slice(5), cb);
    if(kind.startsWith('diary:')) return openThoughtDiary(kind.slice(6), cb);
    if(kind==='schemas') return openSchemas(cb);
    if(kind==='modes') return openModes(cb);
    if(kind==='rescripts') return openRescripts(cb);
    if(kind==='distortions') return openDistortions(cb);
    if(kind==='bodyscan') return openBodyScan(cb);
    if(kind==='emowheel') return openEmoWheel(cb);
    if(kind==='countertransf') return openCountertransf(cb);
    if(kind==='roles') return openRoles(cb);
    openAssocTree(cb);
  });
}

let _h2pLoading;
function ensureHtml2pdf(){
  if(window.html2pdf) return Promise.resolve();
  if(_h2pLoading) return _h2pLoading;
  _h2pLoading=new Promise((res,rej)=>{
    const sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    sc.onload=()=>res(); sc.onerror=()=>rej(new Error('load failed'));
    document.head.appendChild(sc);
  });
  return _h2pLoading;
}
function downloadBlob(blob,name){
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}
function openPdfPreview(c){
  ensureHtml2pdf().catch(()=>{});
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="pdf-modal">
    <div class="pdf-bar">
      <button class="cls" id="pdfClose">Закрыть</button>
      <span class="ttl">Предпросмотр карты</span>
      <button class="btn btn-primary btn-sm" id="pdfShare">⤴ Поделиться</button>
    </div>
    <div class="pdf-scroll">${clientDocFragment(c)}</div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.onclick=e=>{ if(e.target===ov) close(); };
  ov.querySelector('#pdfClose').onclick=close;
  ov.querySelector('#pdfShare').onclick=()=>sharePdf(c, ov);
}
async function sharePdf(c, ov){
  const btn=ov&&ov.querySelector('#pdfShare'); if(btn){ btn.disabled=true; btn.textContent='Собираю…'; }
  toast('Собираю PDF…');
  let ok=true;
  try{ await ensureHtml2pdf(); }catch(e){ ok=false; }
  if(!ok || !window.html2pdf){ if(ov)ov.remove(); printClientDoc(c); return; }
  const root=document.createElement('div');
  root.innerHTML=clientDocFragment(c);
  root.style.cssText='position:fixed;left:-10000px;top:0;width:740px;background:#fff;z-index:-1;';
  document.body.appendChild(root);
  try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready; }catch(e){}
  const name='karta-'+(initials(c.name).replace(/\s/g,'')||'klient')+'-'+today()+'.pdf';
  try{
    const blob=await window.html2pdf().set({margin:[10,9,12,9],image:{type:'jpeg',quality:0.97},
      html2canvas:{scale:2,backgroundColor:'#ffffff',useCORS:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy']}})
      .from(root.querySelector('.pd-page')).outputPdf('blob');
    const file=new File([blob], name, {type:'application/pdf'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:'Карта клиента'}); }
      catch(err){ if(!(err&&err.name==='AbortError')){ downloadBlob(blob,name); toast('Файл сохранён в Загрузки'); } }
    } else { downloadBlob(blob,name); toast('Файл сохранён в Загрузки'); }
  }catch(e){ console.error('pdf',e); printClientDoc(c); }
  finally{ setTimeout(()=>{try{root.remove();}catch(e){}},500); if(ov) ov.remove(); }
}
function printClientDoc(c){
  const html='<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><title>Карта клиента — '+esc(c.name)+'</title><style>@page{margin:14mm 12mm;}body{margin:0;}</style></head><body>'+clientDocFragment(c)+'</body></html>';
  const iframe=document.createElement('iframe');
  iframe.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;opacity:0;';
  document.body.appendChild(iframe);
  try{
    const d=iframe.contentWindow.document; d.open(); d.write(html); d.close();
    setTimeout(()=>{ try{ iframe.contentWindow.focus(); iframe.contentWindow.print(); }catch(e){ toast('На iPad: «Поделиться» → «Печать», затем «Сохранить в PDF».'); }
      setTimeout(()=>{try{iframe.remove();}catch(e){}},60000); },500);
  }catch(e){ toast('Не удалось сформировать PDF'); try{iframe.remove();}catch(_){ } }
}

async function exportData(){
  const dump={version:3,exported:new Date().toISOString(),clients:state.clients,exercises:state.exercises,sessions:state.sessions,courses:state.courses,payMarks:state.payMarks,receipts:state.receipts};
  const blob=new Blob([JSON.stringify(dump,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='50minut-backup-'+today()+'.json'; a.click(); URL.revokeObjectURL(a.href);
  state.lastBackup=new Date().toISOString(); await sSet('lastBackup',state.lastBackup);
  updateBackupLabel(); toast('Резервная копия сохранена');
}
function importData(ev){
  const file=ev.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d.clients) throw new Error();
      if(!(await confirmModal('Заменить все текущие данные данными из файла?'))) return;
      state.clients=d.clients||[]; state.exercises=d.exercises||[]; state.sessions=d.sessions||{};
      state.courses=d.courses||[]; state.payMarks=d.payMarks||{}; state.receipts=d.receipts||{};
      await sSet('clients',state.clients); await sSet('exercises',state.exercises);
      await sSet('courses',state.courses); await sSet('payMarks',state.payMarks); await sSet('receipts',state.receipts);
      for(const c of state.clients){ await sSet('sessions:'+c.id, state.sessions[c.id]||[]); }
      go('today'); toast('Данные загружены');
    }catch(e){ toast('Не удалось прочитать файл'); }
  };
  r.readAsText(file); ev.target.value='';
}
function updateBackupLabel(){
  const el=document.getElementById('backupLabel'); if(!el) return;
  if(state.lastBackup){
    const d=new Date(state.lastBackup);
    el.textContent='копия от '+d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  } else el.textContent='копия ещё не создавалась';
}

async function applyExerciseSeed(){
  const applied = await sGet('exerciseSeedApplied') || {};
  let changed=false;
  // починка: проставить interactive существующему «Дереву ассоциаций», если флаг потерян
  state.exercises.forEach(e=>{ if(!e.interactive && /Дерево ассоциаций/i.test(e.title||'')){ e.interactive='assocTree'; changed=true; } });
  state.exercises.forEach(e=>{ if(!e.interactive){ const t=e.title||'';
    if(/^Схемы/i.test(t)||/Схемы.*Янг/i.test(t)) e.interactive='schemas';
    else if(/^Режимы\s*$/i.test(t)||/Режимы \(/i.test(t)) e.interactive='modes';
    else if(/Рескриптинг/i.test(t)) e.interactive='rescripts';
    else if(/когнитивны/i.test(t)&&/искажен/i.test(t)) e.interactive='distortions';
    else if(/Сканирование тела/i.test(t)) e.interactive='bodyscan';
    else if(/Колесо эмоций/i.test(t)) e.interactive='emowheel';
    else if(/контрперенос/i.test(t)) e.interactive='countertransf';
    if(e.interactive) changed=true;
  }});
  state.exercises.forEach(e=>{ if(!e.interactive && /4-?7-?8/.test(e.title||'')){ e.interactive='breath478'; changed=true; } });
  state.exercises.forEach(e=>{ if(!e.interactive && /5-?4-?3-?2-?1/.test(e.title||'')){ e.interactive='grounding54321'; changed=true; } });
  state.exercises.forEach(e=>{ if(!e.interactive){ const t=e.title||'';
    if(/Дневник мыслей.*расшир/i.test(t)) e.interactive='diary:full';
    else if(/^Дневник мыслей\s*$/i.test(t)||/Дневник мыслей(?!.*расшир)/i.test(t)) e.interactive='diary:basic';
    if(e.interactive) changed=true;
  }});
  state.exercises.forEach(e=>{ if(!e.interactive){ const t=e.title||'';
    if(/Я и тень/i.test(t)) e.interactive='quad:ten';
    else if(/Потребности и целостность/i.test(t)) e.interactive='quad:potreb';
    else if(/Квадрат «Отношения»|Квадрат .Отношения/i.test(t)) e.interactive='quad:otnosh';
    else if(/Окно Джохари/i.test(t)) e.interactive='quad:johari';
    if(e.interactive) changed=true;
  }});
  for(const ex of extraExercises()){
    if(applied[ex.key]) continue;
    if(!state.exercises.some(e=>e.title===ex.title)){
      state.exercises.push({id:uid(), title:ex.title, category:ex.category, body:ex.body, interactive:ex.interactive});
      changed=true;
    }
    applied[ex.key]=true;
  }
  if(changed) await sSet('exercises', state.exercises);
  await sSet('exerciseSeedApplied', applied);
}
