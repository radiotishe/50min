<style>
  :root{
    --paper:#F3EEE3;
    --paper-2:#FBF8F1;
    --ink:#2A2620;
    --ink-soft:#6A6357;
    --ink-faint:#9A9384;
    --line:#E2DACB;
    --pine:#2E6B5C;
    --pine-deep:#1E4A3F;
    --pine-soft:#E4EDE8;
    --terra:#BF5B3E;
    --terra-soft:#F6E4DC;
    --gold:#C99A3E;
    --m1:#C0563E; --m2:#D08A4E; --m3:#C9B05A; --m4:#7FA86A; --m5:#3E8C6A;
    --shadow:0 1px 2px rgba(42,38,32,.05), 0 8px 24px rgba(42,38,32,.06);
    --shadow-lg:0 2px 6px rgba(42,38,32,.08), 0 18px 50px rgba(42,38,32,.12);
    --radius:18px;
    --sans:'Manrope',-apple-system,'Segoe UI',sans-serif;
    --serif:'Lora','Georgia',serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:var(--paper);
    background-image:
      radial-gradient(1200px 800px at 85% -10%, rgba(46,107,92,.07), transparent 60%),
      radial-gradient(900px 700px at -10% 110%, rgba(201,154,62,.06), transparent 55%);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;font-size:16px;color:var(--ink);}
  textarea{resize:vertical;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;border:3px solid transparent;background-clip:content-box;}

  /* layout */
  #app{display:flex;height:100vh;height:100dvh;}
  #nav{
    width:248px;flex:0 0 248px;background:var(--pine-deep);color:#EDE7D8;
    display:flex;flex-direction:column;padding:26px 16px;gap:6px;
    box-shadow:6px 0 30px rgba(30,74,63,.18);z-index:5;
  }
  .brand{padding:6px 10px 24px;}
  .brand-row{display:flex;align-items:center;gap:11px;}
  .brand-mark{display:block;flex:0 0 auto;}
  .brand h1{font-family:var(--serif);font-weight:500;font-size:19px;margin:0;letter-spacing:2px;text-transform:uppercase;color:#EDE3CC;}
  .navbtn{
    display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:13px;
    color:#C7D8D0;font-weight:600;font-size:15px;text-align:left;width:100%;transition:.18s;
  }
  .navbtn .ic{width:20px;text-align:center;font-size:17px;opacity:.85;}
  .navbtn:hover{background:rgba(255,255,255,.06);color:#fff;}
  .navbtn.active{background:var(--pine);color:#fff;box-shadow:0 6px 16px rgba(0,0,0,.18);}
  .nav-spacer{flex:1;}
  .nav-foot{padding:10px 12px 0;border-top:1px solid rgba(255,255,255,.08);}
  .nav-foot button{font-size:12.5px;color:#9DBDB1;padding:7px 2px;display:block;width:100%;text-align:left;}
  .nav-foot button:hover{color:#fff;}

  #main{flex:1;overflow-y:auto;overflow-x:hidden;padding:34px 40px 80px;}
  .wrap{max-width:1080px;margin:0 auto;}
  .page-head{margin:0 0 26px;}
  .page-head h2{font-family:var(--serif);font-weight:600;font-size:32px;margin:0;letter-spacing:.2px;}
  .page-head .sub{color:var(--ink-soft);font-size:14.5px;margin-top:5px;}

  .row{display:flex;gap:16px;flex-wrap:wrap;}
  .between{display:flex;align-items:center;justify-content:space-between;gap:14px;}

  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
  .card.pad{padding:22px 24px;}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:13px;font-weight:700;font-size:15px;transition:.16s;}
  .btn-primary{background:var(--pine);color:#fff;box-shadow:0 6px 16px rgba(46,107,92,.25);}
  .btn-primary:hover{background:var(--pine-deep);transform:translateY(-1px);}
  .btn-ghost{background:transparent;color:var(--pine);border:1.5px solid var(--line);}
  .btn-ghost:hover{border-color:var(--pine);background:var(--pine-soft);}
  .btn-soft{background:var(--pine-soft);color:var(--pine-deep);}
  .btn-soft:hover{background:#D6E5DD;}
  .btn-danger{background:transparent;color:var(--terra);border:1.5px solid var(--terra-soft);}
  .btn-danger:hover{background:var(--terra-soft);}
  .btn-sm{padding:8px 14px;font-size:13.5px;border-radius:10px;}

  /* client list */
  .cl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .cl-card{padding:20px;cursor:pointer;transition:.18s;position:relative;overflow:hidden;}
  .cl-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
  .cl-card .avatar{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:20px;font-weight:600;color:#fff;}
  .cl-card h3{margin:0;font-size:18px;font-weight:700;}
  .cl-meta{font-size:13px;color:var(--ink-soft);margin-top:2px;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;}
  .pill-risk{background:var(--terra-soft);color:var(--terra);}
  .pill-warn{background:#F6EBD2;color:var(--gold);}
  .mini-stats{display:flex;gap:18px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);}
  .mini-stats div{font-size:12px;color:var(--ink-faint);}
  .mini-stats b{display:block;font-size:18px;color:var(--ink);font-weight:700;margin-bottom:1px;}

  /* empty */
  .empty{text-align:center;padding:60px 20px;color:var(--ink-faint);}
  .empty .big{font-size:46px;margin-bottom:8px;opacity:.5;}

  /* client detail */
  .detail-head{display:flex;align-items:flex-start;gap:18px;margin-bottom:8px;}
  .detail-head .avatar{width:64px;height:64px;border-radius:18px;flex:0 0 64px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:28px;font-weight:600;color:#fff;}
  .stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0;}
  .stat{padding:16px 18px;}
  .stat .lab{font-size:12px;color:var(--ink-faint);font-weight:600;letter-spacing:.3px;text-transform:uppercase;}
  .stat .val{font-family:var(--serif);font-size:26px;font-weight:600;margin-top:6px;}
  .section-title{font-family:var(--serif);font-size:19px;font-weight:600;margin:30px 0 12px;display:flex;align-items:center;gap:9px;}

  .next-banner{background:linear-gradient(100deg,var(--pine-soft),#EAF1ED);border:1px solid #CFE0D8;border-radius:var(--radius);padding:18px 20px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;}
  .banner-x{background:rgba(0,0,0,.06);border:none;border-radius:8px;width:28px;height:28px;flex:0 0 28px;color:inherit;font-weight:700;cursor:pointer;font-size:13px;opacity:.7;}
  .banner-x:hover{opacity:1;}
  .next-banner .lab{font-size:12px;font-weight:700;color:var(--pine);letter-spacing:.4px;text-transform:uppercase;}
  .next-banner p{margin:6px 0 0;font-size:15.5px;line-height:1.5;}

  .risk-banner{background:var(--terra-soft);border:1px solid #EBC8BC;border-radius:var(--radius);padding:16px 20px;color:#8A3D26;display:flex;gap:12px;align-items:flex-start;}
  .risk-banner b{color:var(--terra);}

  /* session list */
  .ses{padding:18px 20px;margin-bottom:12px;cursor:pointer;transition:.16s;}
  .ses:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);}
  .ses-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .ses-date{font-family:var(--serif);font-size:17px;font-weight:600;}
  .tag{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:8px;}
  .tag-ontime{background:var(--pine-soft);color:var(--pine);}
  .tag-late{background:#F6EBD2;color:var(--gold);}
  .tag-noshow{background:#EEE6DB;color:var(--ink-soft);}
  .mood-dot{width:13px;height:13px;border-radius:50%;display:inline-block;}
  .ses-snip{color:var(--ink-soft);font-size:14px;margin-top:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

  /* tabs */
  .tabs{display:flex;gap:6px;margin:24px 0 18px;border-bottom:1px solid var(--line);overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{padding:11px 18px;font-weight:700;font-size:14.5px;color:var(--ink-soft);border-bottom:2.5px solid transparent;margin-bottom:-1px;white-space:nowrap;flex:0 0 auto;}
  .tab.active{color:var(--pine);border-color:var(--pine);}

  /* forms */
  .field{margin-bottom:20px;}
  .field label{display:block;font-size:13.5px;font-weight:700;color:var(--ink-soft);margin-bottom:7px;letter-spacing:.2px;}
  .field input[type=text],.field input[type=date],.field input[type=number],.field textarea,.field select{
    width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:12px;background:#fff;transition:.15s;
  }
  .field textarea{line-height:1.55;min-height:90px;}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--pine);box-shadow:0 0 0 3px var(--pine-soft);}
  .field .hint{font-size:12px;color:var(--ink-faint);margin-top:6px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

  /* mood picker */
  .moods{display:flex;gap:8px;}
  .moodbtn{flex:1;padding:14px 4px;border-radius:12px;border:1.5px solid var(--line);background:#fff;text-align:center;transition:.14s;}
  .moodbtn .d{width:42px;height:42px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;}
  .moodbtn .t{font-size:11px;font-weight:700;color:var(--ink-soft);line-height:1.2;}
  .moodbtn.sel{border-width:2px;transform:translateY(-2px);box-shadow:var(--shadow);}
  .moods.compact{gap:7px;}
  .moods.compact .moodbtn{padding:9px 3px;}
  .moods.compact .moodbtn .d{width:34px;height:34px;}
  .moods-mini{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
  .moodbtn-mini{width:32px;height:32px;border-radius:50%;border:none;padding:0;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;opacity:.5;transition:.14s;flex:0 0 32px;}
  .moodbtn-mini.sel{opacity:1;box-shadow:0 0 0 2px var(--paper-2),0 0 0 4px var(--ink);}
  /* risk picker */
  .risks{display:flex;gap:8px;}
  .riskbtn{flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-weight:700;font-size:13.5px;color:var(--ink-soft);transition:.14s;}
  .riskbtn.sel-none{border-color:var(--pine);background:var(--pine-soft);color:var(--pine-deep);}
  .riskbtn.sel-passive{border-color:var(--gold);background:#F6EBD2;color:#8A6A1E;}
  .riskbtn.sel-active{border-color:var(--terra);background:var(--terra-soft);color:var(--terra);border-width:2px;}
  .risk-toggle{display:inline-flex;align-items:center;gap:10px;background:none;border:none;padding:0;cursor:pointer;font-weight:700;font-size:13.5px;letter-spacing:.2px;color:var(--ink-soft);}
  .risk-toggle.on{color:var(--ink-soft);}
  .risk-cbx{width:19px;height:19px;border-radius:6px;border:2px solid var(--line);background:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex:0 0 19px;transition:.14s;}
  .risk-cbx.on{background:#9E6B4E;border-color:#9E6B4E;}
  .risk-toggle.dz.on{color:var(--ink-soft);}
  .risk-cbx.dz.on{background:var(--pine);border-color:var(--pine);}
  .field textarea.mini-area{min-height:0;padding-top:9px;padding-bottom:9px;line-height:1.4;}
  .tri-boxes{display:flex;flex-direction:column;gap:8px;}
  .goals-check{display:flex;flex-direction:column;gap:8px;}
  .goal-check{display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;cursor:pointer;transition:.14s;font-size:14px;color:var(--ink);line-height:1.4;}
  .goal-check.on{border-color:var(--pine);background:var(--pine-soft);}
  .goal-check .gc-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);background:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex:0 0 20px;margin-top:1px;}
  .goal-check.on .gc-box{background:var(--pine);border-color:var(--pine);}
  .goal-check .gc-txt{flex:1;}
  .fs-modal{position:fixed;inset:0;z-index:60;background:var(--paper-2);display:flex;flex-direction:column;}
  .fs-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;border-bottom:1px solid var(--line);}
  .fs-title{font-family:var(--serif);font-weight:600;font-size:18px;}
  .fs-area{flex:1;width:100%;border:none;outline:none;background:var(--paper-2);padding:16px;font-size:16px;line-height:1.6;resize:none;color:var(--ink);}
  .ex-pick{display:block;width:100%;text-align:left;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:11px 14px;margin-bottom:8px;cursor:pointer;transition:.14s;}
  .ex-pick:hover{border-color:var(--pine);background:var(--pine-soft);}
  .ex-pick b{display:block;font-size:14.5px;}
  .ex-pick span{display:block;font-size:12.5px;color:var(--ink-soft);margin-top:3px;line-height:1.45;}

  /* AI box */
  .ai-box{background:#fff;border:1.5px dashed #CFE0D8;border-radius:14px;padding:6px;}
  .ai-bar{display:flex;align-items:center;gap:10px;padding:8px 10px;flex-wrap:wrap;}
  .ai-status{font-size:12.5px;color:var(--ink-faint);}
  .spinner{width:15px;height:15px;border:2px solid var(--pine-soft);border-top-color:var(--pine);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* exercise */
  .ex-card{padding:18px 20px;margin-bottom:12px;}
  .ex-cat{font-size:11.5px;font-weight:700;color:var(--pine);letter-spacing:.4px;text-transform:uppercase;}
  .ex-body{color:var(--ink-soft);font-size:14px;line-height:1.6;margin-top:8px;white-space:pre-wrap;}
  .chip{display:inline-block;padding:5px 12px;border-radius:20px;background:var(--pine-soft);color:var(--pine-deep);font-size:12.5px;font-weight:700;margin:0 6px 6px 0;cursor:pointer;}
  .chip.act{background:var(--pine);color:#fff;}

  /* charts */
  .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:11px;}
  .bar-row .nm{width:130px;font-size:13.5px;font-weight:600;flex:0 0 130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-track{flex:1;height:14px;background:var(--line);border-radius:8px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:8px;}
  .bar-val{width:54px;text-align:right;font-size:13px;font-weight:700;flex:0 0 54px;}

  /* dashboard */
  .appt{display:flex;align-items:center;gap:14px;background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:14px 18px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow);transition:.16s;}
  .appt:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg);}
  .appt-time{font-family:var(--serif);font-size:19px;font-weight:600;line-height:1;}
  .appt-time span{display:block;font-family:var(--sans);font-size:12px;color:var(--ink-faint);font-weight:600;margin-top:3px;}
  .appt-bar{width:4px;align-self:stretch;border-radius:3px;}
  .appt-name{flex:1;font-size:17px;font-weight:700;}
  .appt-go{font-size:22px;color:var(--ink-faint);}
  .week{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .day{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);}
  .day-now{border-color:var(--pine);box-shadow:0 0 0 2px var(--pine-soft),var(--shadow);}
  .day-head{font-weight:700;font-size:14px;margin-bottom:10px;display:flex;align-items:baseline;gap:7px;}
  .day-head span{font-size:12px;color:var(--ink-faint);font-weight:600;}
  .day-head em{margin-left:auto;font-style:normal;font-size:11px;font-weight:700;color:var(--pine);background:var(--pine-soft);padding:2px 8px;border-radius:10px;}
  .day-appt{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid var(--line);cursor:pointer;}
  .day-appt:first-of-type{border-top:none;}
  .day-time{font-weight:700;font-size:13.5px;width:46px;flex:0 0 46px;}
  .day-dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px;}
  .day-cname{font-size:14px;}
  .day-empty{color:var(--ink-faint);font-size:13px;padding:4px 0;}
  .slot-line{display:flex;align-items:center;gap:10px;background:var(--pine-soft);border-radius:12px;padding:12px 16px;margin-bottom:14px;}
  .slot-line b{font-size:15px;}
  .today-kicker{font-weight:700;color:var(--pine);text-transform:uppercase;letter-spacing:1px;font-size:11px;line-height:1;}
  .today-date{font-family:var(--serif);font-weight:600;font-size:17px;margin:2px 0 0;line-height:1.15;}
  .today-date.big{font-size:26px;}
  .today-head-inview{margin-bottom:20px;}
  .topbar-slot{flex:1;display:flex;align-items:center;gap:8px;min-width:0;}
  .tb-title{font-family:var(--serif);font-weight:600;font-size:20px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tb-action{flex:0 0 auto;}
  .tb-back{flex:0 0 auto;width:34px;height:34px;border-radius:10px;border:1.5px solid var(--line);background:#fff;color:var(--pine);font-size:18px;font-weight:700;cursor:pointer;}
  .tb-icon{flex:0 0 auto;width:34px;height:34px;border-radius:10px;border:1.5px solid var(--line);background:#fff;color:var(--pine);font-size:16px;cursor:pointer;}
  .tb-chip{flex:0 0 auto;background:var(--pine-soft);color:var(--pine-deep);border-radius:10px;padding:6px 11px;font-weight:700;font-size:12.5px;white-space:nowrap;}

  /* anketa */
  .sec-h{font-family:var(--serif);font-size:18px;font-weight:600;display:flex;align-items:center;gap:10px;margin:24px 0 12px;}
  .sec-n{width:25px;height:25px;border-radius:8px;background:var(--pine);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-family:var(--sans);font-size:13px;font-weight:700;flex:0 0 25px;}
  .aopt{color:var(--ink-faint);font-weight:400;}
  .ascale-row{display:flex;gap:5px;flex-wrap:wrap;}
  .ascale{flex:1;min-width:30px;height:38px;border:1.5px solid var(--line);border-radius:9px;background:#fff;font-size:13px;font-weight:700;color:var(--ink-soft);}
  .ascale.sel{background:var(--gold);border-color:var(--gold);color:#fff;}
  .safety-note{font-size:12.5px;color:#8A3D26;background:var(--terra-soft);border-radius:10px;padding:10px 13px;margin-bottom:16px;line-height:1.5;}
  .consent{display:flex;gap:11px;align-items:flex-start;font-size:14px;line-height:1.5;text-align:left;width:100%;background:none;border:none;color:var(--ink);}
  .consent .cbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--pine);flex:0 0 22px;margin-top:1px;display:flex;align-items:center;justify-content:center;color:var(--pine);font-weight:800;}
  .consent.on .cbox{background:var(--pine);color:#fff;}
  .arow{display:flex;gap:12px;padding:7px 0;border-top:1px solid var(--line);}
  .arow:first-of-type{border-top:none;}
  .alab{flex:0 0 130px;font-size:12.5px;color:var(--ink-faint);font-weight:600;}
  .aval{flex:1;font-size:14px;line-height:1.45;white-space:pre-wrap;}
  .cl-anketa{font-size:11px;font-weight:700;color:var(--ink-faint);}
  .cl-anketa.done{color:var(--pine);}

  /* payments */
  .monthbar{display:flex;align-items:center;justify-content:space-between;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:8px 14px;margin-bottom:14px;font-weight:700;font-size:15px;}
  .mb-arw{background:none;border:none;color:var(--pine);font-size:22px;font-weight:700;padding:0 8px;cursor:pointer;}
  .pay-table{width:100%;border-collapse:collapse;font-size:14px;}
  .pay-table th{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-faint);font-weight:700;padding:8px 4px;}
  .pay-table th.l,.pay-table td.l{text-align:left;}
  .pay-table th.ctr,.pay-table td.ctr{text-align:center;}
  .pay-table td{padding:11px 4px;border-top:1px solid var(--line);vertical-align:middle;}
  .pay-who{cursor:pointer;font-weight:700;display:flex;flex-direction:column;gap:1px;}
  .pay-who small{font-weight:600;color:var(--ink-faint);font-size:11px;}
  .pay-bang{color:var(--terra);}
  .chk-btn{width:26px;height:26px;border-radius:7px;border:2px solid var(--line);background:#fff;font-weight:800;color:#fff;cursor:pointer;}
  .pay-chk.on{background:var(--pine);border-color:var(--pine);}
  .pay-rcpt.on{background:var(--gold);border-color:var(--gold);}
  .bal{font-weight:700;font-size:13px;}
  .bal small{display:block;font-weight:600;color:var(--ink-faint);font-size:10.5px;}
  .pay-warn{color:var(--terra);font-weight:700;font-size:12.5px;}
  .foot-sum{display:flex;justify-content:space-between;margin-top:14px;padding:0 4px;font-size:14px;}
  .foot-sum b{font-family:var(--serif);font-size:17px;}
  .pay-note{font-size:12px;color:var(--ink-soft);background:#EFE9DC;border-radius:10px;padding:11px 13px;margin-top:14px;line-height:1.5;}
  .course{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:12px;box-shadow:var(--shadow);}
  .course h4{margin:0 0 2px;font-size:16px;}
  .cmeta{font-size:11.5px;color:var(--ink-faint);margin-bottom:10px;}
  .crow{display:flex;align-items:center;gap:7px;padding:9px 0;border-top:1px solid var(--line);flex-wrap:wrap;}
  .crow:first-of-type{border-top:none;}
  .cnm{flex:1;font-size:13.5px;font-weight:600;min-width:90px;}
  .part-chip{font-size:11px;font-weight:700;padding:5px 10px;border-radius:9px;border:1.5px solid var(--line);background:#fff;color:var(--ink-faint);cursor:pointer;}
  .part-chip.paid{background:var(--pine-soft);border-color:var(--pine);color:var(--pine-deep);}
  .crow-del{background:none;border:none;color:var(--ink-faint);font-weight:700;cursor:pointer;padding:4px 6px;}
  .crow-del:hover{color:var(--terra);}
  /* client payment block */
  .pay-rate{display:flex;align-items:center;gap:8px;background:var(--pine-soft);border-radius:11px;padding:11px 14px;font-size:13.5px;font-weight:600;color:var(--pine-deep);margin-bottom:14px;}
  .seg{display:flex;gap:6px;margin-bottom:14px;}
  .seg button{flex:1;padding:10px;border-radius:11px;border:1.5px solid var(--line);background:#fff;font-weight:700;font-size:13px;color:var(--ink-soft);cursor:pointer;}
  .seg button.on{border-color:var(--pine);background:var(--pine-soft);color:var(--pine-deep);}
  .bigbal{display:flex;align-items:baseline;gap:8px;margin:6px 0;}
  .bigbal .n{font-family:var(--serif);font-size:30px;font-weight:600;}
  .pay-hist{margin-top:16px;padding-top:14px;border-top:1px solid var(--line);}

<script>
/* ============ robust storage layer ============
   Tries: localStorage (reliable when file opened in Safari)  →
          window.storage (Claude web sandbox)  →  in-memory (session only). */
const Store = (() => {
  let localOK=false, cloudOK=false;
  const mem={};
  try{ const k='__probe__'; localStorage.setItem(k,'1'); localStorage.removeItem(k); localOK=true; }catch(e){ localOK=false; }

  async function probeCloud(){
    try{
      if(window.storage && typeof window.storage.set==='function'){
        await window.storage.set('__probe__','1',false); cloudOK=true;
      }
    }catch(e){ cloudOK=false; }
  }
  async function get(key){
    if(key in mem) return mem[key];
    if(localOK){ try{ const v=localStorage.getItem(key); if(v!=null){ mem[key]=JSON.parse(v); return mem[key]; } }catch(e){} }
    if(cloudOK){ try{ const r=await window.storage.get(key,false); if(r&&r.value!=null){ mem[key]=JSON.parse(r.value); return mem[key]; } }catch(e){} }
    return null;
  }
  async function set(key,val){
    mem[key]=val; const s=JSON.stringify(val); let ok=false;
    if(localOK){ try{ localStorage.setItem(key,s); ok=true; }catch(e){ localOK=false; } }
    if(cloudOK){ try{ await window.storage.set(key,s,false); ok=true; }catch(e){} }
    return ok;
  }
  async function del(key){
    delete mem[key];
    if(localOK){ try{ localStorage.removeItem(key); }catch(e){} }
    if(cloudOK){ try{ await window.storage.delete(key,false); }catch(e){} }
  }
  return { get,set,del,probeCloud, persistent:()=>localOK||cloudOK };
})();
async function sGet(k){ return await Store.get(k); }

  const STATIC_KEYS=['clients','exercises','courses','payMarks','receipts','exerciseSeedApplied','seedDone','lastBackup','fixAE'];
  function syncKeys(){
    const ks=[...STATIC_KEYS];

    return ks;

  function client(){ if(!sb && window.supabase){ sb=window.supabase.createClient(URL,KEY); } return sb; }
  const enc=new TextEncoder(), dec=new TextDecoder();
  const b64=(buf)=>btoa(String.fromCharCode(...new Uint8Array(buf)));
  const unb64=(s)=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));

  async function deriveKey(password, saltBytes){
    const base=await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:saltBytes, iterations:150000, hash:'SHA-256'},
      base, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
  }
  async function encryptObj(obj){
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const data=enc.encode(JSON.stringify(obj));
    const ct=await crypto.subtle.encrypt({name:'AES-GCM', iv}, cryptoKey, data);
    return {iv:b64(iv), salt:b64(salt), data:b64(ct)};
  }

    const iv=unb64(payload.iv), ct=unb64(payload.data);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM', iv}, cryptoKey, ct);
    return JSON.parse(dec.decode(plain));
  }

  // включить синхронизацию: задать/ввести пароль
  async function enable(password){
    if(!client()) { lastErr='Библиотека Supabase не загрузилась'; return {ok:false, err:lastErr}; }
    // есть ли уже строка в облаке?
    const {data, error}=await sb.from('app_data').select('payload').eq('id',ROW_ID).maybeSingle();
    if(error){ lastErr=error.message; return {ok:false, err:lastErr}; }
    if(data && data.payload){
      // облако уже есть — пароль должен подойти к существующей соли
      let payload; try{ payload=JSON.parse(data.payload); }catch(e){ lastErr='Повреждённые данные в облаке'; return {ok:false,err:lastErr}; }
      salt=unb64(payload.salt);
      cryptoKey=await deriveKey(password, salt);
      try{ await decryptPayload(payload); }catch(e){ cryptoKey=null; lastErr='Неверный пароль'; return {ok:false, err:'wrongpass'}; }
      enabled=true; await sSet('cloudOn', true);
      return {ok:true, hasRemote:true};
    } else {
      // облака ещё нет — создаём новую соль
      salt=crypto.getRandomValues(new Uint8Array(16));
      cryptoKey=await deriveKey(password, salt);
      enabled=true; await sSet('cloudOn', true);
      return {ok:true, hasRemote:false};
    }
  }

  // забрать из облака и записать локально
  async function pull(){
    if(!enabled) return {ok:false};
    const {data, error}=await sb.from('app_data').select('payload').eq('id',ROW_ID).maybeSingle();
    if(error){ lastErr=error.message; return {ok:false, err:lastErr}; }
    if(!data || !data.payload) return {ok:true, empty:true};
    const obj=await decryptPayload(JSON.parse(data.payload));
    for(const k of syncKeys()){ if(k in obj){ await Store.set(k, obj[k]); } }
    return {ok:true};
  }
  // собрать локальные данные, зашифровать и отправить
  async function push(){
    if(!enabled) return {ok:false};
    const obj={}; for(const k of syncKeys()){ const v=await Store.get(k); if(v!=null) obj[k]=v; }
    const payload=await encryptObj(obj);
    const {error}=await sb.from('app_data').upsert({id:ROW_ID, payload:JSON.stringify(payload), updated_at:new Date().toISOString()});
    if(error){ lastErr=error.message; return {ok:false, err:lastErr}; }
    await sSet('cloudLast', new Date().toISOString());
    return {ok:true};
  }
  return {
    enable, pull, push,
    isOn:()=>enabled,
    lastError:()=>lastErr,
    disable: async()=>{ enabled=false; cryptoKey=null; await sSet('cloudOn', false); }
  };
})();

  size=size||40;
  const col=stroke||'#fff';
  const eyeR = col==='#fff' ? 1.4 : 2.3;       // крупнее точки для тёмного варианта
  const sw   = col==='#fff' ? 2.4 : 3.4;       // толще линии для тёмного варианта
  // кривая рта: 1 — грустная (углы вверх), 5 — улыбка (углы вниз). Управляем контрольной точкой.
  const mouths={
    1:'M16 33 Q24 25 32 33',   // сильно грустный
    2:'M16 31 Q24 27 32 31',   // грустноватый
    3:'M16 30 L32 30',         // прямой
    4:'M16 29 Q24 34 32 29',   // улыбка
    5:'M15 28 Q24 38 33 28'    // широкая улыбка
  };
  return `<svg viewBox="0 0 48 48" width="${size}" height="${size}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round">
    <circle cx="18" cy="20" r="${eyeR}" fill="${col}" stroke="none"/>
    <circle cx="30" cy="20" r="${eyeR}" fill="${col}" stroke="none"/>
    <path d="${mouths[v]}"/>
  </svg>`;
}

async function applyClientSeedData(){
  // одноразово: внесение сессии 03.06.2026 для Е.К.
  const ekDone = await sGet('ekSession0306') || false;
  if(!ekDone){
    const ek=state.clients.find(x=>x.name==='Е. К.');
    if(ek){
      const arr=state.sessions[ek.id]=state.sessions[ek.id]||[];
      const exists=arr.some(s=>s.date==='2026-06-03');
      if(!exists){
        arr.push({
          id:uid(), date:'2026-06-03', mood:2, arrival:'ontime', risk:'none', homeworkFlag:true,
          notes:'Первая сессия после 2-недельного перерыва. Четыре потока: профессор (идеализация → исчез → звонок → злость); отец и квартира бабушки (выбросил вещи без спроса); «сталкер» в соцсети → персекуторные мысли; дача и чувствительность к звукам. Сквозная тема — «свободная энергия» после увольнения, утекающая в тревогу.',
          summaryList:[
            'Вышли на связку: «не он нужен, а дефицит заботы, который он закрыл» → клиентка коснулась грусти.',
            'Сформулирована гипотеза про высвободившуюся после увольнения энергию, уходящую в тревогу.',
            ''
          ],
          homeworkList:['Микроэксперимент с планированием отдыха.','',''],
          nextList:[
            'План ↔ тревога — через эксперимент с планированием.',
            'Профессор → её собственные потребности (дефицит заботы).',
            'Психиатр — обсудить, если сходила на приём.'
          ],
          goalsTouched:['Снижение тревоги / внутренняя опора','Потребность в заботе и отношениях'],
          drawing:null, drawNote:''
        });
        await sSet('sessions:'+ek.id, arr);
      }
    }
    await sSet('ekSession0306', true);
  }

  // одноразовое исправление: ошибочно созданный «А. Е.» — это на самом деле А. И.
  const fixed = await sGet('fixAE') || false;
  if(!fixed){
    const ae=state.clients.find(x=>x.name==='А. Е.');
    if(ae){
      // перенесём данные в А.И., если у него ещё нет, затем удалим А.Е.
      const ai=state.clients.find(x=>x.name==='А. И.');
      if(ai){
        if(ae.profile && !(ai.profile||'').trim()) ai.profile=ae.profile;
        if(ae.intake && !ai.intake) ai.intake=ae.intake;
        if(ae.plan && !ai.plan) ai.plan=ae.plan;
        const aeSes=state.sessions[ae.id]||[];
        if(aeSes.length){ const arr=state.sessions[ai.id]=state.sessions[ai.id]||[];
          aeSes.forEach(s=>{ if(!arr.some(x=>x.date===s.date && (x.notes||'')===(s.notes||''))) arr.push(s); });
          await sSet('sessions:'+ai.id, arr);
        }
        await sSet('clients',state.clients);
      }
      state.clients=state.clients.filter(x=>x.id!==ae.id); delete state.sessions[ae.id];
      await Store.del('sessions:'+ae.id); await sSet('clients',state.clients);
    }
    // снять отметку, чтобы данные «Насти» применились к А.И.
    const ap = await sGet('seedDataApplied') || {};
    delete ap['new:А. Е.'];
    await sSet('seedDataApplied', ap);
    await sSet('fixAE', true);
  }
  // разовый сброс флага для А.Ф., чтобы дозаполнить план (этапы/цели/ресурсы/риски)
  const fixAF = await sGet('fixAF') || false;
  if(!fixAF){
    const ap = await sGet('seedDataApplied') || {};
    delete ap['А. Ф.'];
    await sSet('seedDataApplied', ap);
    await sSet('fixAF', true);
  }
  const applied = await sGet('seedDataApplied') || {};
  const data=clientSeedData();
  let changed=false, sessChanged={};
  for(const d of data){
    const tag = d.match==='__new__' ? ('new:'+d.name) : d.match;
    if(applied[tag]) continue; // уже применяли — пропускаем
    let cl;
    if(d.match==='__new__'){
      cl=state.clients.find(x=>x.name===d.name);
      if(!cl){ cl={id:uid(),name:d.name,slot:d.slot||null,color:AVATARS[state.clients.length%AVATARS.length],createdAt:Date.now()}; state.clients.push(cl); state.sessions[cl.id]=[]; changed=true; }
    } else {
      cl=state.clients.find(x=>x.name===d.match);
      if(!cl) continue; // нет такого клиента — пропускаем
    }
    if(d.profile && !(cl.profile||'').trim()){ cl.profile=d.profile; changed=true; }
    if(d.essence && !(cl.essence||'').trim()){ cl.essence=d.essence; changed=true; }
    if(d.intake && !cl.intake){ cl.intake=Object.assign({}, d.intake, {filledAt:new Date().toISOString()}); changed=true; }
    if(d.plan){
      if(!cl.plan){ cl.plan=d.plan; changed=true; }
      else {
        const p=cl.plan;
        const emptyArr=a=>!a || !a.some(x=>x&&(''+x).trim());
        // этапы
        if(d.plan.stages && emptyArr(p.stages)){ p.stages=d.plan.stages; changed=true; }
        if(d.plan.current!=null && (p.current==null || p.current<0)){ p.current=d.plan.current; changed=true; }
        // списки
        ['goalsList','resources','risks','contact'].forEach(k=>{
          if(d.plan[k] && emptyArr(p[k])){ p[k]=d.plan[k]; p[k.replace('List','')+'Done']=d.plan[k+'Done']||d.plan[k.replace('List','')+'Done']||[false,false,false,false,false]; changed=true; }
        });
        // на случай старого текстового goals
        if(d.plan.goalsList && (!p.goalsList || emptyArr(p.goalsList)) && p.goals && !p.goals.trim()) { p.goalsList=d.plan.goalsList; changed=true; }
      }
    }
    if(d.sessions && d.sessions.length){
      const arr=state.sessions[cl.id]=state.sessions[cl.id]||[];
      d.sessions.forEach(sd=>{
        if(!arr.some(x=>x.date===sd.date && (x.notes||'')===(sd.notes||''))){
          arr.push(Object.assign({id:uid()}, sd)); sessChanged[cl.id]=true;
        }
      });
    }
    applied[tag]=true;
  }
  if(changed) await sSet('clients',state.clients);
  for(const cid in sessChanged){ await sSet('sessions:'+cid, state.sessions[cid]); }
  await sSet('seedDataApplied', applied);
}

function fmtShort(iso){ const d=new Date(iso); return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'}); }
function today(){ return new Date().toISOString().slice(0,10); }

function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

/* ============ scheduling helpers ============ */
function pad2(n){ return String(n).padStart(2,'0'); }
function fmtTime(t){ return t||''; }
function clientsOnWeekday(wd){
  return state.clients.filter(c=>!c.archived && c.slot && c.slot.weekday===wd)
    .sort((a,b)=>(a.slot.time||'').localeCompare(b.slot.time||''));
}
function dateKeyOf(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
// клиенты на конкретную календарную дату: по расписанию ИЛИ по разовой дате
function clientsOnDate(d){
  const wd=d.getDay(); const dk=dateKeyOf(d);
  const seen=new Set(); const out=[];
  state.clients.forEach(c=>{
    if(c.archived) return;
    const bySlot = c.slot && c.slot.weekday===wd;
    const byExtra = (c.extraDates||[]).includes(dk);
    if(bySlot||byExtra){
      if(!seen.has(c.id)){
        seen.add(c.id);
        const time = byExtra && !bySlot ? extraTime(c,dk) : (c.slot?c.slot.time:'');
        out.push({c, extra:byExtra && !bySlot, time});
      }
    }
  });
  out.sort((a,b)=> (a.time||'99:99').localeCompare(b.time||'99:99'));
  return out;
}
function endTime(time,dur){
  const [h,m]=(time||'0:0').split(':').map(Number);
  const total=h*60+m+(dur||60);
  return pad2(Math.floor(total/60)%24)+':'+pad2(total%60);
}
// next calendar date (Date obj) for a weekly slot, from given anchor (default now)
function nextSlotDate(slot, anchor){
  const now=anchor||new Date();
  const [h,m]=(slot.time||'0:0').split(':').map(Number);
  const d=new Date(now); d.setHours(h,m,0,0);
  let diff=(slot.weekday - d.getDay()+7)%7;
  if(diff===0 && d<now) diff=7;
  d.setDate(d.getDate()+diff);
  return d;
}
function mondayOfThisWeek(){
  const d=new Date(); d.setHours(0,0,0,0);
  const off=(d.getDay()+6)%7; // days since Monday
  d.setDate(d.getDate()-off); return d;
}
// краткая строка про ближайшую консультацию для чипа в шапке: «Вт · 8 июня · 16:00»
function nextConsultLine(c){
  if(!c) return '';
  const now=new Date(); now.setHours(0,0,0,0);
  let nextExtra=null;
  (c.extraDates||[]).forEach(dk=>{
    const [y,m,d]=dk.split('-').map(Number); const dt=new Date(y,m-1,d);
    if(dt>=now && (!nextExtra || dt<nextExtra)){ nextExtra=dt; nextExtra._dk=dk; }
  });
  const nextSlot = c.slot ? nextSlotDate(c.slot) : null;
  let nearest=null, nearestExtra=false;
  if(nextSlot && nextExtra){ if(nextExtra<=nextSlot){ nearest=nextExtra; nearestExtra=true; } else nearest=nextSlot; }
  else if(nextExtra){ nearest=nextExtra; nearestExtra=true; }
  else if(nextSlot){ nearest=nextSlot; }
  if(nearest){
    const tm = nearestExtra ? extraTime(c, nearest._dk) : (c.slot?c.slot.time:'');
    const wd = WD_SHORT[nearest.getDay()];
    const dm = nearest.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
    return [wd, dm, tm].filter(Boolean).join(' · ') + (nearestExtra?' (разовая)':'');
  }
  if(c.slot) return `${WD_SHORT[c.slot.weekday]} · ${c.slot.time}`;
  return '';
}

/* ============ payments helpers ============ */
const MONTHS_RU=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
function curMonthKey(){ const d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1); }
function monthLabel(key){ const [y,m]=key.split('-').map(Number); return MONTHS_RU[m-1]+' '+y; }
function shiftMonth(key,delta){ let [y,m]=key.split('-').map(Number); m+=delta; while(m<1){m+=12;y--;} while(m>12){m-=12;y++;} return y+'-'+pad2(m); }
function fmtMoney(n){ if(n==null||n==='') return ''; return Number(n).toLocaleString('ru-RU')+' ₽'; }
function clientPrepaid(c){ return (c.payType==='pre') ? (Number(c.prepaid)||0) : null; }
function needsPayment(c){ return c.payType==='pre' && (Number(c.prepaid)||0)<=0; }

// все даты сессий клиента в месяце monthKey (YYYY-MM) из его расписания
function sessionDatesInMonth(c, monthKey){
  const [y,m]=monthKey.split('-').map(Number);
  const out=[];
  if(c.slot){
    const d=new Date(y, m-1, 1);
    while(d.getMonth()===m-1){
      if(d.getDay()===c.slot.weekday) out.push(y+'-'+pad2(m)+'-'+pad2(d.getDate()));
      d.setDate(d.getDate()+1);
    }
  }
  // разовые (вручную добавленные) даты этого месяца
  (c.extraDates||[]).forEach(dk=>{ if(dk.slice(0,7)===monthKey && !out.includes(dk)) out.push(dk); });
  out.sort();
  return out;
}
async function addExtraDate(c, dateKey, time){
  c.extraDates=c.extraDates||[];
  if(!c.extraDates.includes(dateKey)) c.extraDates.push(dateKey);
  if(time){ c.extraTimes=c.extraTimes||{}; c.extraTimes[dateKey]=time; }
  await sSet('clients',state.clients);
}
function extraTime(c,dateKey){ return (c.extraTimes&&c.extraTimes[dateKey])|| (c.slot?c.slot.time:'') ||''; }
async function removeExtraDate(c, dateKey){
  c.extraDates=(c.extraDates||[]).filter(d=>d!==dateKey);
  // заодно убрать отметки оплаты по этой дате
  if(state.payMarks){ delete state.payMarks[c.id+':'+dateKey]; await sSet('payMarks',state.payMarks); }
  await sSet('clients',state.clients);
}
function isExtraDate(c,dateKey){ return (c.extraDates||[]).includes(dateKey) && (!c.slot || true); }
// отметки по конкретной дате-сессии: held (была), paid (оплачена)
function sesMark(clientId, dateKey){
  const m=(state.payMarks||{})[clientId+':'+dateKey];
  // по умолчанию считаем, что сессия запланирована и состоится (held=true), оплата — нет
  return m || {held:true, paid:false};
}
async function setSesMark(clientId, dateKey, field, val){
  state.payMarks=state.payMarks||{};
  const k=clientId+':'+dateKey;
  const cur=state.payMarks[k]||{held:true,paid:false};
  cur[field]=val; state.payMarks[k]=cur;
  await sSet('payMarks',state.payMarks);
}
// сводка по клиенту за месяц: {total, held, paid}
function clientMonthPay(c, monthKey){
  const dates=sessionDatesInMonth(c, monthKey);
  let held=0, paid=0;
  dates.forEach(dk=>{ const m=sesMark(c.id,dk); if(m.held){ held++; if(m.paid) paid++; } });
  return {total:dates.length, held, paid, dates};
}

// чеки: храним по дате-ключу YYYY-MM-DD → массив записей {clientId, name}; галочка done
function receiptKey(dateKey){ return 'rcpt:'+dateKey; }
function receiptDone(dateKey){ return !!(state.receipts||{})[dateKey]; }
async function toggleReceipt(dateKey){
  state.receipts=state.receipts||{};
  state.receipts[dateKey]=!state.receipts[dateKey];
  await sSet('receipts',state.receipts);
}

// записать оплату вперёд (N сессий)
async function addPrepay(c,sessions,amount){
  c.payType='pre';
  c.prepaid=(Number(c.prepaid)||0)+Number(sessions);
  c.payHistory=c.payHistory||[];
  c.payHistory.unshift({type:'prepay',date:new Date().toISOString(),sessions:Number(sessions),amount:Number(amount)||0});
  await sSet('clients',state.clients);
}
async function changeRate(c,newRate){
  const old=c.rate;
  c.payHistory=c.payHistory||[];
  if(old && Number(old)!==Number(newRate)) c.payHistory.unshift({type:'rate',date:new Date().toISOString(),from:Number(old),to:Number(newRate)});
  c.rate=Number(newRate);
  c.rateSince=new Date().toISOString();
  await sSet('clients',state.clients);
}

/* ============ ICS generation ============ */
function icsStamp(dt){ // UTC stamp for DTSTAMP
  return dt.getUTCFullYear()+pad2(dt.getUTCMonth()+1)+pad2(dt.getUTCDate())+'T'+pad2(dt.getUTCHours())+pad2(dt.getUTCMinutes())+pad2(dt.getUTCSeconds())+'Z';
}
function icsLocal(dt){ // floating local time (no TZ) — shows at this wall-clock time on device
  return dt.getFullYear()+pad2(dt.getMonth()+1)+pad2(dt.getDate())+'T'+pad2(dt.getHours())+pad2(dt.getMinutes())+'00';
}
function vevent(client){
  if(!client.slot) return '';
  const start=nextSlotDate(client.slot);
  const end=new Date(start.getTime()+(client.slot.dur||60)*60000);
  return ['BEGIN:VEVENT',
    'UID:'+client.id+'@kabinet',
    'DTSTAMP:'+icsStamp(new Date()),
    'DTSTART:'+icsLocal(start),
    'DTEND:'+icsLocal(end),
    'RRULE:FREQ=WEEKLY;BYDAY='+BYDAY[client.slot.weekday],
    'SUMMARY:'+(client.name||'Клиент').replace(/[,;\\]/g,' '),
    'END:VEVENT'].join('\r\n');
}
function downloadICS(events, filename){
  const body=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//50 minut//RU','CALSCALE:GREGORIAN',events,'END:VCALENDAR'].join('\r\n');
  const blob=new Blob([body],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);
  toast('Файл календаря создан — откройте его, чтобы добавить в Календарь');
}
function addClientToCalendar(id){
  const c=clientById(id); if(!c||!c.slot){ toast('Сначала задайте день и время в карточке клиента'); return; }
  downloadICS(vevent(c), 'session-'+initials(c.name).replace(/\s/g,'')+'.ics');
}
function addAllToCalendar(){
  const evs=state.clients.filter(c=>c.slot).map(vevent).filter(Boolean).join('\r\n');
  if(!evs){ toast('Нет клиентов с заданным расписанием'); return; }
  downloadICS(evs, 'raspisanie.ics');
}

function todayDateStr(){

}
function todayHeaderHTML(big){

function viewToday(){
  const now=new Date(); const todayWd=now.getDay();
  const head=`<div class="today-head-inview">${todayHeaderHTML(true)}</div>`;

  // today's appointments
  const todays=clientsOnDate(now);
  let todayBlock;
  if(todays.length){

      const end=time?endTime(time,c.slot?c.slot.dur:60):'';
      return `<div class="appt" data-open="${c.id}">

/* ============ mood trend SVG ============ */
function moodTrend(sessions){
  const data=sessions.slice().reverse().filter(s=>s.mood);
  if(data.length<2) return `<div class="empty" style="padding:30px"><p>Нужно минимум 2 сессии с отмеченным настроением, чтобы построить график.</p></div>`;
  const W=Math.max(320, data.length*64), H=180, pad=28;
  const x=i=>pad+i*((W-pad*2)/(data.length-1));
  const y=v=>H-pad-((v-1)/4)*(H-pad*2);
  let pts=data.map((s,i)=>`${x(i)},${y(s.mood)}`).join(' ');
  let dots=data.map((s,i)=>`<circle cx="${x(i)}" cy="${y(s.mood)}" r="5.5" fill="${moodColor(s.mood)}" stroke="#fff" stroke-width="2"/>
     <text x="${x(i)}" y="${H-8}" font-size="10" fill="var(--ink-faint)" text-anchor="middle">${fmtShort(s.date)}</text>`).join('');
  let grid=[1,2,3,4,5].map(v=>`<line x1="${pad}" x2="${W-pad}" y1="${y(v)}" y2="${y(v)}" stroke="var(--line)" stroke-width="1"/>`).join('');
  return `<div style="font-family:var(--serif);font-size:17px;font-weight:600;margin-bottom:14px">Динамика настроения</div>
  <div style="overflow-x:auto"><svg width="${W}" height="${H}" style="display:block">
    ${grid}<polyline points="${pts}" fill="none" stroke="var(--pine)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${dots}
  </svg></div>`;
}

function attachPlanClient(c){
  c.plan=c.plan||{stages:['','','','',''], current:-1, goals:''};
  if(!c.plan.goalsList) c.plan.goalsList = (c.plan.goals&&c.plan.goals.trim())?[c.plan.goals.trim(),'','','','']:['','','','',''];
  if(!c.plan.goalsDone) c.plan.goalsDone=[false,false,false,false,false];
  ['resources','risks','contact'].forEach(k=>{ if(!c.plan[k]) c.plan[k]=['','','','','']; if(!c.plan[k+'Done']) c.plan[k+'Done']=[false,false,false,false,false]; });
  // авто-рост текстовых полей плана
  document.querySelectorAll('.plan-area').forEach(t=>{ autoGrow(t); t.addEventListener('input',()=>autoGrow(t)); });
  const lists=['resources','risks','contact'];
  const saveAll=async()=>{
    for(let i=0;i<5;i++){
      const el=document.getElementById('stage_'+i); if(el) c.plan.stages[i]=el.value;
      const gl=document.getElementById('goal_'+i); if(gl) c.plan.goalsList[i]=gl.value;
      lists.forEach(k=>{ const e=document.getElementById(k+'_'+i); if(e) c.plan[k][i]=e.value; });
    }
    await sSet('clients',state.clients);
  };
  document.querySelectorAll('[data-stage]').forEach(b=>b.onclick=async()=>{
    await saveAll();
    const i=+b.dataset.stage;
    c.plan.current = (c.plan.current===i) ? -1 : i;
    await sSet('clients',state.clients); render();
  });
  document.querySelectorAll('[data-goal]').forEach(b=>b.onclick=async()=>{
    await saveAll();
    const i=+b.dataset.goal;
    c.plan.goalsDone[i]=!c.plan.goalsDone[i];
    await sSet('clients',state.clients); render();
  });
  document.querySelectorAll('[data-list]').forEach(b=>b.onclick=async()=>{
    await saveAll();
    const k=b.dataset.list, i=+b.dataset.i;
    c.plan[k+'Done'][i]=!c.plan[k+'Done'][i];
    await sSet('clients',state.clients); render();
  });
  for(let i=0;i<5;i++){
    const el=document.getElementById('stage_'+i);
    if(el) el.onblur=async()=>{ c.plan.stages[i]=el.value; await sSet('clients',state.clients); };
    const gl=document.getElementById('goal_'+i);
    if(gl) gl.onblur=async()=>{ c.plan.goalsList[i]=gl.value; await sSet('clients',state.clients); };
    lists.forEach(k=>{ const e=document.getElementById(k+'_'+i); if(e) e.onblur=async()=>{ c.plan[k][i]=e.value; await sSet('clients',state.clients); }; });
  }
}

/* ============ handwriting canvas (Черновики) ============ */
function attachDraw(holder, saveFn){
  const canvas=document.getElementById('drawCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const DPR=window.devicePixelRatio||1;
  // палитра
  const PEN_COLOR='#2B2B2B';
  let curColor=PEN_COLOR, mode='pen', drawing=false, last=null, mkPts=[];

  function fitCanvas(restore){
    const cssW=canvas.clientWidth, cssH=720;
    canvas.style.height=cssH+'px';
    canvas.width=cssW*DPR; canvas.height=cssH*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.lineCap='round'; ctx.lineJoin='round';
    if(restore && holder.drawing){
      const img=new Image();
      img.onload=()=>ctx.drawImage(img,0,0,cssW,cssH);
      img.src=holder.drawing;
    }
  }
  fitCanvas(true);

  function pos(e){
    const r=canvas.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    const sc=holder._drawScale||1;
    return {x:(t.clientX-r.left)/sc, y:(t.clientY-r.top)/sc, f:(t.force!==undefined&&t.force>0)?t.force:(t.pressure!==undefined&&t.pressure>0?t.pressure:null)};
  }
  function start(e){ e.preventDefault(); const p=pos(e);
    drawing=true; last=p; mkPts=[p]; }
  function move(e){
    if(!drawing) return; e.preventDefault();
    const p=pos(e);
    if(mode==='erase'){
      ctx.globalCompositeOperation='destination-out'; ctx.globalAlpha=1; ctx.lineWidth=24;
      ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    } else if(mode==='marker'){
      mkPts.push(p);
      ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=0.30;
      ctx.strokeStyle=curColor; ctx.lineCap='butt'; ctx.lineJoin='round'; ctx.lineWidth=18;
      ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
      ctx.globalAlpha=1;
    } else {
      ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=curColor; ctx.lineCap='round'; ctx.lineJoin='round';
      const dx=p.x-last.x, dy=p.y-last.y; const speed=Math.sqrt(dx*dx+dy*dy);
      let press = p.f!=null ? p.f : Math.max(0, 1 - speed/14);
      press=Math.max(0.15, Math.min(1, press));
      ctx.lineWidth = 0.35 + press*1.0;
      ctx.globalAlpha = 0.28 + press*0.37;
      ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
      ctx.globalAlpha=1;
    }
    last=p;
  }
  async function end(){
    if(!drawing) return; drawing=false;
    mkPts=[];
    try{ holder.drawing=canvas.toDataURL('image/png'); await saveFn(); }catch(e){ console.error(e); }
  }

  // ── ввод: рисует ТОЛЬКО Apple Pencil; палец(ы) — зум листа ──
  if(window.PointerEvent){
    canvas.style.touchAction='none';
    canvas.addEventListener('pointerdown',e=>{ if(e.pointerType==='pen'||e.pointerType==='mouse'){ start(e); } });
    canvas.addEventListener('pointermove',e=>{ if(drawing && (e.pointerType==='pen'||e.pointerType==='mouse')) move(e); });
    window.addEventListener('pointerup',e=>{ if(drawing) end(); });
    window.addEventListener('pointercancel',e=>{ if(drawing) end(); });
  } else {
    canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
    canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end);
  }

  // ── зум листа двумя пальцами (pinch) ──
  const scaleBox=document.getElementById('drawScale');
  if(scaleBox){
    let pinch=null;
    const dist=(a,b)=>Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
    const apply=()=>{ const z=holder._drawScale||1; scaleBox.style.transformOrigin='top left'; scaleBox.style.transform='scale('+z+')'; scaleBox.style.width=(100/z)+'%'; };
    if(!holder._drawScale) holder._drawScale=1;
    apply();
    canvas.addEventListener('touchstart',e=>{ if(e.touches.length===2){ drawing=false; pinch={d:dist(e.touches[0],e.touches[1]), z:holder._drawScale||1}; } },{passive:false});
    canvas.addEventListener('touchmove',e=>{ if(pinch && e.touches.length===2){ e.preventDefault();
      const nd=dist(e.touches[0],e.touches[1]); let z=pinch.z*(nd/pinch.d); z=Math.max(1, Math.min(3, z)); holder._drawScale=Math.round(z*100)/100; apply(); } },{passive:false});
    canvas.addEventListener('touchend',e=>{ if(e.touches.length<2) pinch=null; });
  }

  const pen=document.getElementById('toolPen'), er=document.getElementById('toolErase'), mk=document.getElementById('toolMarker'), tx=document.getElementById('toolText');
  const tools=[pen,mk,er].filter(Boolean);
  const setActive=el=>tools.forEach(t=>t.classList.toggle('active',t===el));
  if(pen) pen.onclick=()=>{ mode='pen'; curColor=PEN_COLOR; setActive(pen); };
  if(mk) mk.onclick=()=>{ mode='marker'; curColor='#F7BFD8'; setActive(mk); };
  if(er) er.onclick=()=>{ mode='erase'; setActive(er); };
  const clr=document.getElementById('drawClear');
  if(clr) clr.onclick=async()=>{
    if(!(await confirmModal('Очистить черновик этого клиента?', true))) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    delete holder.drawing; await saveFn();
  };
  const shareBtn=document.getElementById('drawShare');
  if(shareBtn) shareBtn.onclick=async()=>{
    const w=canvas.width, h=canvas.height, dpr=DPR;
    const out=document.createElement('canvas'); out.width=w; out.height=h;
    const o=out.getContext('2d');
    o.fillStyle='#FFFFFF'; o.fillRect(0,0,w,h);
    o.strokeStyle='#EAEAEA'; o.lineWidth=1;
    const step=22*dpr;
    for(let x=0;x<=w;x+=step){ o.beginPath(); o.moveTo(x,0); o.lineTo(x,h); o.stroke(); }
    for(let y=0;y<=h;y+=step){ o.beginPath(); o.moveTo(0,y); o.lineTo(w,y); o.stroke(); }
    o.drawImage(canvas,0,0);
    const dataUrl=out.toDataURL('image/png');
    // пробуем нативный share
    let shared=false;
    try{
      const blob=await (await fetch(dataUrl)).blob();
      const file=new File([blob],'chernovik.png',{type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:'Черновик'});
        shared=true;
      }
    }catch(e){ shared=true; /* пользователь открыл шит и закрыл — не показываем модалку */ }
    if(shared) return;
    // запасной путь: показать картинку в модалке — удержи палец, чтобы сохранить/поделиться
    const ov=document.createElement('div'); ov.className='overlay';
    ov.innerHTML=`<div class="modal" style="max-width:520px;text-align:center">
      <h3 style="margin:0 0 6px">Черновик готов</h3>
      <div style="font-size:13px;color:var(--ink-soft);margin-bottom:12px">Удерживай палец на картинке → «Сохранить изображение» или «Поделиться».</div>
      <img src="${dataUrl}" style="width:100%;border:1px solid var(--line);border-radius:10px">
      <div class="modal-actions" style="justify-content:center;margin-top:14px">
        <a class="btn btn-primary btn-sm" href="${dataUrl}" download="chernovik.png">Скачать</a>
        <button class="btn btn-ghost btn-sm" id="shClose">Закрыть</button>
      </div></div>`;
    document.body.appendChild(ov);
    ov.onclick=e=>{ if(e.target===ov) ov.remove(); };
    ov.querySelector('#shClose').onclick=()=>ov.remove();
  };
}

function payClientBlock(c){
  if(!state.cPayMonth) state.cPayMonth=curMonthKey();
  const mk=state.cPayMonth;
  const pre=c.payType==='pre';
  const post=!pre;
  const sched=c.slot?` · ${WD_SHORT[c.slot.weekday]} ${c.slot.time}`:'';
  const rateDate=c.rateSince?` · повышена ${fmtDate(c.rateSince)}`:'';

      </div>`;
  } else {
    const mp=clientMonthPay(c,mk);
    const rows=mp.dates.map(dk=>{
      const m=sesMark(c.id,dk); const day=Number(dk.split('-')[2]);
      const extra=(c.extraDates||[]).includes(dk);

      const dlabel=day+' '+MONTHS_RU[Number(mk.split('-')[1])-1].toLowerCase().slice(0,3)+(tm?' '+tm:'')+(extra?' <span class="extra-tag">разовая</span>':'');

        <button class="psr-ck held ${m.held?'on':''}" data-cses="${c.id}|${dk}|held">${m.held?'✓':''}</button>

    mid=`<div class="monthbar" style="margin-top:6px"><button class="mb-arw" id="cMonthPrev">‹</button>
        <span>${monthLabel(mk)}</span><button class="mb-arw" id="cMonthNext">›</button></div>
      <div class="psr psr-head"><span class="psr-d"></span><span class="psr-l">была</span><span class="psr-l">оплата</span><span style="width:20px;flex:0 0 20px"></span></div>

  }

  const hist=(c.payHistory||[]).map(h=>{
    if(h.type==='prepay') return `<div class="hline"><span>${fmtShort(h.date)} — оплата ${h.sessions} сес.</span><b>+${fmtMoney(h.amount)}</b></div>`;
    if(h.type==='rate') return `<div class="hline"><span>${fmtShort(h.date)} — ставка изменена</span><b>${fmtMoney(h.from)} → ${fmtMoney(h.to)}</b></div>`;
    return '';
  }).join('');
  const histBlock=hist?`<div class="pay-hist"><div class="hh">История</div>${hist}</div>`:'';

  return `<div class="card pad">

    <div class="grid2" style="margin:12px 0 14px">
      <div class="field" style="margin-bottom:0"><label>Ставка за сессию, ₽</label>

        <button class="btn btn-soft btn-sm" id="pp_rate_save">OK</button></div></div>
      <div></div>
    </div>

    ${histBlock}

}
function attachPayClient(c){
  const v=document.getElementById('view');
  v.querySelectorAll('[data-paytype]').forEach(b=>b.onclick=async()=>{
    c.payType=b.dataset.paytype; if(c.payType==='pre' && c.prepaid==null) c.prepaid=0;
    await sSet('clients',state.clients); render();
  });
  const rs=document.getElementById('pp_rate_save');
  if(rs) rs.onclick=async()=>{ const val=+document.getElementById('pp_rate').value; if(!val){toast('Укажите ставку');return;} await changeRate(c,val); render(); toast('Ставка сохранена'); };
  const add=document.getElementById('pp_add');
  if(add) add.onclick=async()=>{ const ss=+document.getElementById('pp_sessions').value; const a=+document.getElementById('pp_amount').value;
    if(!ss){toast('Сколько сессий?');return;} await addPrepay(c,ss,a); render(); toast('Оплата записана'); };
  const minus=document.getElementById('pp_minus');
  if(minus) minus.onclick=async()=>{ c.prepaid=Math.max(0,(Number(c.prepaid)||0)-1); await sSet('clients',state.clients); render(); };
  // month nav for client pay grid
  const cp=document.getElementById('cMonthPrev'); if(cp) cp.onclick=()=>{ state.cPayMonth=shiftMonth(state.cPayMonth,-1); render(); };
  const cn=document.getElementById('cMonthNext'); if(cn) cn.onclick=()=>{ state.cPayMonth=shiftMonth(state.cPayMonth,1); render(); };
  // session marks in client card
  v.querySelectorAll('[data-cses]').forEach(b=>b.onclick=async()=>{
    const [cid,dk,fld]=b.dataset.cses.split('|'); const cur=sesMark(cid,dk)[fld];
    await setSesMark(cid,dk,fld,!cur);
    if(fld==='held' && cur){ await setSesMark(cid,dk,'paid',false); }
    render();
  });
  const ae=document.getElementById('addExtra');
  if(ae) ae.onclick=async()=>{
    const r=await datePrompt('Дата и время сессии', true, c.slot?c.slot.time:'12:00');
    if(r===null) return;
    await addExtraDate(c, r.date, r.time);
    state.cPayMonth=r.date.slice(0,7);
    render(); toast('Сессия добавлена');
  };
  v.querySelectorAll('[data-delextra]').forEach(b=>b.onclick=async()=>{
    const [cid,dk]=b.dataset.delextra.split('|');
    if(!(await confirmModal('Убрать эту разовую дату?',true))) return;
    await removeExtraDate(c, dk); render();
  });
}

        state.editingIntake[g]=val;

        wrap.querySelectorAll(`[data-g="${g}"]`).forEach(x=>x.classList.toggle('sel', x===el));
        if(g==='mood'){ wrap.querySelectorAll('[data-g="mood"]').forEach(x=>x.style.borderColor=''); el.style.borderColor=MOODS[val-1].c; }
      }
    };
  });
  const cons=document.getElementById('a_consent');
  if(cons) cons.onclick=()=>{ state.editingIntake.consent=!state.editingIntake.consent;
    cons.classList.toggle('on',state.editingIntake.consent);
    cons.querySelector('.cbox').textContent=state.editingIntake.consent?'✓':''; };
  document.getElementById('cancelAnketa').onclick=()=>{ state.tab='about'; go('client',state.clientId); };
  const bfa=document.getElementById('backFromAnketa'); if(bfa) bfa.onclick=()=>{ state.tab='about'; go('client',state.clientId); };
  document.getElementById('saveAnketa').onclick=saveAnketa;
}
async function saveAnketa(){
  const s=state.editingIntake;
  ['age','occupation','living','contact','request','goal','priorNote','meds','conditions','events','supportContact','supports','coping','expectations','oc_want','oc_situation','oc_tried','oc_resources','oc_focus','oc_recommend'].forEach(f=>{
    const el=document.getElementById('a_'+f); if(el) s[f]=el.value;
  });
  s.filledAt=new Date().toISOString();
  const c=clientById(state.clientId);
  c.intake=Object.assign({},s);
  // auto-fill «О клиенте», если пусто
  if(!(c.profile||'').trim()){
    const p=[]; if(s.request) p.push('Запрос: '+s.request); if(s.goal) p.push('Цель: '+s.goal);
    if(p.length) c.profile=p.join('\n\n');
  }
  await sSet('clients',state.clients);
  state.tab='about'; go('client',state.clientId); toast('Анкета сохранена');
}

function viewPayments(){
  if(!state.payMonth) state.payMonth=curMonthKey();

  let body;
  if(tab==='courses') body=payCourses();
  else if(tab==='receipts') body=payReceipts();
  else body=paySessionsSummary();
  return head + `<div class="monthbar"><button class="mb-arw" id="monthPrev">‹</button>
      <span>${monthLabel(state.payMonth)}</span><button class="mb-arw" id="monthNext">›</button></div>` + body;
}
// сводка по сессиям: клиент → его сессии за месяц с галочками «была»/«оплата»
function paySessionsSummary(){
  const mk=state.payMonth;
  let received=0;
  const blocks=state.clients.map(c=>{
    if(c.archived) return '';
    if(c.payType==='pre'){
      const warn=needsPayment(c);
      return `<div class="paysum-c">
        <div class="paysum-h" data-open="${c.id}"><span>${esc(c.name)} ${warn?'<span class="pay-bang">❗</span>':''}</span>
          <span class="paysum-badge ${warn?'warn':'ok'}">${warn?'нужна оплата':'предоплата · '+clientPrepaid(c)+' сес.'}</span></div></div>`;
    }
    const mp=clientMonthPay(c,mk);
    if(c.rate) received += mp.paid * Number(c.rate);
    const rows=mp.dates.map(dk=>{
      const m=sesMark(c.id,dk); const day=Number(dk.split('-')[2]);
      const extra=(c.extraDates||[]).includes(dk);
      const tm=extra?extraTime(c,dk):'';
      const dlabel=day+' '+MONTHS_RU[Number(mk.split('-')[1])-1].toLowerCase().slice(0,3)+(tm?' '+tm:'')+(extra?' <span class="extra-tag">разовая</span>':'');
      return `<div class="psr ${m.held?'':'off'}">
        <span class="psr-d">${dlabel}</span>
        <button class="psr-ck held ${m.held?'on':''}" data-ses="${c.id}|${dk}|held">${m.held?'✓':''}</button>
        <button class="psr-ck paid ${m.paid?'on':''}" data-ses="${c.id}|${dk}|paid" ${m.held?'':'disabled'}>${m.paid?'✓':''}</button>
        ${extra?`<button class="psr-del" data-sumdelextra="${c.id}|${dk}">✕</button>`:'<span style="width:20px;flex:0 0 20px"></span>'}
      </div>`;
    }).join('');
    const headRow = mp.total ? `<div class="psr psr-head"><span class="psr-d"></span><span class="psr-l">была</span><span class="psr-l">оплата</span><span style="width:20px;flex:0 0 20px"></span></div>` : '';
    const emptyMsg = mp.total ? '' : '<div style="font-size:12.5px;color:var(--ink-faint);padding:6px 0">В этом месяце сессий нет.</div>';
    return `<div class="paysum-c">
      <div class="paysum-h"><span data-open="${c.id}">${esc(c.name)}</span>
        <span class="paysum-badge ${mp.paid<mp.held?'warn':'ok'}">${mp.paid}/${mp.held} опл.</span></div>
      ${headRow}
      ${rows}${emptyMsg}
      <button class="btn btn-soft btn-sm" data-sumaddextra="${c.id}" style="margin-top:8px">＋ Добавить дату</button>
    </div>`;
  }).filter(Boolean).join('');
  return `<div class="card" style="padding:14px">${blocks||'<div style="color:var(--ink-faint);padding:10px">Нет клиентов с расписанием в этом месяце.</div>'}</div>
    <div class="foot-sum"><span>Получено за месяц (по ставкам)</span><b>${fmtMoney(received)}</b></div>
    <div class="pay-note">Даты берутся из расписания. «＋ Добавить дату» — для переноса или разовой встречи. «Была» — состоялась ли сессия. «Оплата» — оплачена ли. Чеки — на отдельной вкладке. Нажми на имя — карточка клиента.</div>`;
}
function payReceipts(){
  const mk=state.payMonth; // YYYY-MM
  const items=[];
  // 1) оплаченные сессии клиентов
  state.clients.forEach(c=>{
    if(c.payType==='pre') return;
    clientMonthPay(c,mk).dates.forEach(dk=>{
      const m=sesMark(c.id,dk);
      if(m.held && m.paid){
        items.push({key:'ses|'+c.id+'|'+dk, date:dk, who:c.name, what:'сессия', amount:c.rate?Number(c.rate):0});
      }
    });
  });
  // 1b) внесения предоплаты вперёд (по дате внесения)
  state.clients.forEach(c=>{
    (c.payHistory||[]).forEach((h,idx)=>{
      if(h.type==='prepay' && h.date && h.date.slice(0,7)===mk){
        items.push({key:'pre|'+c.id+'|'+h.date+'|'+idx, date:h.date.slice(0,10), who:c.name, what:'предоплата '+h.sessions+' сес.', amount:Number(h.amount)||0});
      }
    });
  });
  // 2) оплаченные части курсов с датой в этом месяце
  state.courses.forEach(co=>{
    (co.people||[]).forEach(p=>{
      (p.paid||[]).forEach(part=>{
        const d=p.dates&&p.dates[part];
        if(d && d.slice(0,7)===mk){
          const per=(co.price&&co.parts)?Math.round(Number(co.price)/co.parts):0;
          items.push({key:'crs|'+co.id+'|'+p.id+'|'+part, date:d, who:p.name, what:co.title+' · '+(part+1)+' часть', amount:per});
        }
      });
    });
  });
  if(!items.length) return `<div class="card pad"><div class="empty"><div class="big">🧾</div><p>За этот месяц пока нет оплат.<br>Отметь оплату на вкладках «Сессии» и «Курсы» — все оплаты появятся здесь для отметки чеков.</p></div></div>`
    + `<div class="pay-note">Здесь по датам собираются все пришедшие оплаты — и сессии, и курсы. Ставишь галочку, когда сделала чек.</div>`;
  items.sort((a,b)=> a.date.localeCompare(b.date) || a.who.localeCompare(b.who));
  const rows=items.map(it=>{
    const day=Number(it.date.split('-')[2]); const done=receiptDone(it.key);
    return `<div class="rcpt-row ${done?'done':''}">
      <button class="rcpt-ck ${done?'on':''}" data-rcpt="${it.key}">${done?'✓':''}</button>
      <div class="rcpt-info"><div class="rcpt-date">${day} ${monthLabel(mk).split(' ')[0].toLowerCase()} · ${esc(it.who)}</div>
        <div class="rcpt-names">${esc(it.what)}${it.amount?' · '+fmtMoney(it.amount):''}</div></div>
    </div>`;
  }).join('');
  const left=items.filter(it=>!receiptDone(it.key)).length;
  const total=items.reduce((s,it)=>s+(it.amount||0),0);
  return `<div class="card" style="padding:8px 14px 14px">${rows}</div>
    <div class="foot-sum"><span style="color:${left?'var(--terra)':'var(--pine)'}">${left?('Чеков не сделано: '+left):'Все чеки сделаны'}</span>${total?`<b>${fmtMoney(total)}</b>`:''}</div>
    <div class="pay-note">Все оплаты месяца по датам — сессии и части курсов. Каждая строка — отдельный чек. Галочка — чек сделан.</div>`;
}
function payCourses(){
  const list=state.courses.map(co=>{
    const people=(co.people||[]).map(p=>{
      const parts=(co.parts||2);
      const chips=[];
      for(let i=0;i<parts;i++){
        const paid=(p.paid||[]).includes(i);
        const pdate=(p.dates&&p.dates[i])?`<span class="part-date">${fmtShort(p.dates[i])}</span>`:'';
        chips.push(`<button class="part-chip ${paid?'paid':''}" data-course="${co.id}" data-person="${p.id}" data-part="${i}">${i+1} часть${paid?' ✓':''}${pdate}</button>`);
      }
      return `<div class="crow"><span class="cnm">${esc(p.name)}</span>${chips.join('')}
        <button class="crow-del" data-delperson="${co.id}:${p.id}">✕</button></div>`;
    }).join('');
    return `<div class="course">
      <div class="between"><div><h4>${esc(co.title)}</h4><div class="cmeta">${esc(co.meta||'')}${co.price?' · '+fmtMoney(co.price):''}</div></div>
        <button class="crow-del" data-delcourse="${co.id}" style="font-size:14px">✕</button></div>
      ${people||'<div style="font-size:12.5px;color:var(--ink-faint);padding:6px 0">Пока нет участников</div>'}
      <button class="btn btn-soft btn-sm" data-addperson="${co.id}" style="margin-top:10px">＋ Участник</button>
    </div>`;
  }).join('');
  return `<div class="between" style="margin-bottom:14px"><div class="sub" style="color:var(--ink-soft)">Курсы и предоплаты участников</div>
      <button class="btn btn-primary btn-sm" id="addCourse">＋ Курс</button></div>
    ${list||'<div class="card pad"><div class="empty"><div class="big">✎</div><p>Курсов пока нет.</p></div></div>'}
    <div class="pay-note">Нажми на «часть», чтобы отметить оплату — спросит дату прихода. Повторное нажатие снимает отметку.</div>`;
}

/* ============ VIEW: exercises ============ */
function viewExercises(){
  const sel = state.exSelect||false;
  const chosen = state.exChosen || (state.exChosen=new Set());
  const headRight = sel
    ? `<button class="btn btn-ghost btn-sm" id="exSelCancel">Готово</button>`
    : `<button class="btn btn-soft btn-sm" id="exSelStart">Выбрать</button><button class="btn btn-primary btn-sm" id="addEx" style="margin-left:6px">＋</button>`;
  const head=`<div class="between page-head"><div><h2>Упражнения</h2><div class="sub">Библиотека техник на случай, когда нужно чем-то наполнить сессию</div></div>
    <div style="display:flex;align-items:center;flex:0 0 auto">${headRight}</div></div>`;
  if(!state.exercises.length) return head+`<div class="card pad"><div class="empty"><div class="big">✦</div><p>Библиотека пуста.</p></div></div>`;
  const cats=[...new Set(state.exercises.map(e=>e.category||'Прочее'))];
  const filt=state.exFilter||'all';
  const cur = (filt==='all'||cats.includes(filt))?filt:'all';
  const chips=`<div class="ex-filter">`+
    [['all','Все'],...cats.map(c=>[c,c])].map(([k,l])=>`<button class="ex-chip ${cur===k?'active':''}" data-exfilter="${esc(k)}">${esc(l)}</button>`).join('')+
    `</div>`;
  const selbar = sel ? `<div class="ex-selbar"><span class="ex-seln">Выбрано: ${chosen.size}</span>
      <button class="ex-selb" id="exSelEdit"${chosen.size===1?'':' disabled'}>Изменить</button>
      <button class="ex-selb del" id="exSelDel"${chosen.size?'':' disabled'}>Удалить</button></div>` : '';
  let out='';
  cats.filter(cat=>cur==='all'||cat===cur).forEach(cat=>{
    out+=`<div class="section-title">${esc(cat)}</div>`;
    out+=state.exercises.filter(e=>(e.category||'Прочее')===cat).map(e=>{
      const inter = e.interactive || (/Дерево ассоциаций/i.test(e.title)?'assocTree':/4-?7-?8/.test(e.title)?'breath478':/5-?4-?3-?2-?1/.test(e.title)?'grounding54321':'');
      const checked = chosen.has(e.id);
      if(sel){
        return `<div class="card ex-card ex-pick ${checked?'on':''}" data-pick="${e.id}">
          <span class="ex-check ${checked?'on':''}"></span>
          <div style="flex:1"><div style="font-weight:700;font-size:16px">${esc(e.title)}</div>
          <div class="ex-body">${esc(e.body)}</div></div></div>`;
      }
      return `<div class="card ex-card"${inter?` data-open-inter="${inter}"`:` data-edit-ex="${e.id}"`} style="cursor:pointer">
        <div style="flex:1"><div style="font-weight:700;font-size:16px">${esc(e.title)}${inter?' <span style="font-size:11px;color:var(--pine);font-weight:700">· нажми ▸</span>':''}</div>
        <div class="ex-body">${esc(e.body)}</div></div></div>`;
    }).join('');
  });
  return head+selbar+chips+out;
}

  v.querySelectorAll('[data-ses]').forEach(b=>b.onclick=async()=>{
    const [cid,dk,fld]=b.dataset.ses.split('|'); const cur=sesMark(cid,dk)[fld];

    if(r===null) return;

    const part=+b.dataset.part; p.paid=p.paid||[]; p.dates=p.dates||{};

    }

function splitPoints(text){
  if(!text || !text.trim()) return [];
  // перенос строки перед нумерацией "1) " / "2. " даже если всё в одну строку
  let t=text.replace(/\s+(?=\d+[.)]\s)/g,'\n');
  let parts=t.split(/\n+|;+|•|·|\u2022/)
    .map(x=>x.replace(/^\s*(?:\d+[.)]|[-–—*])\s*/,'').trim())
    .filter(Boolean);
  return parts;
}
function triList(arr, legacy){
  if(Array.isArray(arr)){ const a=arr.slice(0,3); while(a.length<3) a.push(''); return a; }
  const parts=splitPoints(legacy);
  if(parts.length<=3){ while(parts.length<3) parts.push(''); return parts.slice(0,3); }
  // больше трёх пунктов — остаток складываем в третье окошко, ничего не теряя
  return [parts[0], parts[1], parts.slice(2).join('\n')];
}

function openBreath478(){
  const m=document.createElement('div'); m.className='fs-modal';
  m.innerHTML=`<div class="fs-bar"><span class="fs-title">Дыхание 4-7-8</span>
      <button class="btn btn-primary btn-sm" id="brDone">Готово</button></div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:20px;text-align:center">
      <div class="br-stage">
        <div class="br-ring"></div>
        <div class="br-orb" id="brOrb"><div class="br-count" id="brCount">4</div></div>
      </div>
      <div class="br-phase" id="brPhase">Вдох</div>
      <div class="br-sub" id="brCycle">Цикл 1 из 4</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-soft" id="brToggle">Старт</button>
        <button class="btn btn-ghost" id="brReset">Сброс</button>
      </div>
      <div class="br-legend">Вдох носом на 4 · задержка на 7 · медленный выдох ртом на 8</div>
    </div>`;
  document.body.appendChild(m);
  const orb=m.querySelector('#brOrb'), countEl=m.querySelector('#brCount'),
        phaseEl=m.querySelector('#brPhase'), cycleEl=m.querySelector('#brCycle'),
        toggle=m.querySelector('#brToggle');
  const phases=[['Вдох',4,'in'],['Задержка',7,'hold'],['Выдох',8,'out']];
  let running=false, pi=0, left=4, cycle=1, timer=null;
  function applyPhase(){
    const [name,dur,kind]=phases[pi];
    phaseEl.textContent=name; left=dur; countEl.textContent=dur;
    orb.classList.remove('in','out','hold'); void orb.offsetWidth; orb.classList.add(kind);
    orb.style.transitionDuration=dur+'s';
  }
  function tick(){
    left--; 
    if(left<=0){
      pi++;
      if(pi>=phases.length){ pi=0; cycle++; if(cycle>4){ stop(); cycleEl.textContent='Готово · 4 цикла'; phaseEl.textContent='Спокойно'; return; } cycleEl.textContent='Цикл '+cycle+' из 4'; }
      applyPhase();
    } else countEl.textContent=left;
  }
  function start(){ running=true; toggle.textContent='Пауза'; applyPhase(); timer=setInterval(tick,1000); }
  function stop(){ running=false; toggle.textContent='Старт'; clearInterval(timer); orb.classList.remove('in','out','hold'); }
  toggle.onclick=()=>{ running?stop():start(); };
  m.querySelector('#brReset').onclick=()=>{ stop(); pi=0; cycle=1; left=4; countEl.textContent='4'; phaseEl.textContent='Вдох'; cycleEl.textContent='Цикл 1 из 4'; };
  m.querySelector('#brDone').onclick=()=>{ stop(); m.remove(); };
}

function openRoles(onDone){
  // 5 ролей, у каждой: название, «сколько» (много/достаточно/мало), «энергия» (наполняет/истощает), шаг
  const roles=Array.from({length:5}).map(()=>({name:'',amount:'',energy:'',step:''}));
  const m=document.createElement('div'); m.className='fs-modal';
  function render(){
    const body=roles.map((r,i)=>`<div class="rl-card">
        <div class="rl-head"><span class="rl-num">${i+1}</span>
          <input class="rl-name" data-rl="${i}|name" placeholder="роль… (мама, партнёр, специалист, дочь, друг)" value="${esc(r.name)}"></div>
        <div class="rl-qline">
          <div class="rl-qlab">Сколько этой роли в жизни?</div>
          <div class="rl-opts">
            ${[['mало','Недостаточно'],['ок','Достаточно'],['много','Слишком много']].map(([v,l])=>`<button class="rl-opt ${r.amount===v?'on '+v:''}" data-rlamt="${i}|${v}">${l}</button>`).join('')}
          </div>
        </div>
        <div class="rl-qline">
          <div class="rl-qlab">Эта роль меня…</div>
          <div class="rl-opts">
            ${[['fill','Наполняет'],['drain','Истощает'],['mix','По-разному']].map(([v,l])=>`<button class="rl-opt ${r.energy===v?'on '+(v==='fill'?'good':v==='drain'?'bad':'')+'':''}" data-rleng="${i}|${v}">${l}</button>`).join('')}
          </div>
        </div>
        <div class="rl-qlab" style="margin-top:8px">Что сделать, чтобы гармонизировать эту роль?</div>
        <textarea class="rl-step" data-rl="${i}|step" placeholder="один шаг: добавить / уменьшить / делегировать / попросить о…">${esc(r.step)}</textarea>
      </div>`).join('');
    m.innerHTML=`<div class="fs-bar"><span class="fs-title">Мои роли в жизни</span>
        <button class="btn btn-primary btn-sm" id="rlDone">Готово</button></div>
      <div style="overflow:auto;flex:1;padding:14px">
        <div class="md-hint">Выпиши 5 своих главных ролей. По каждой ответь: хватает ли её, наполняет она или истощает, и какой один шаг поможет привести её к балансу.</div>
        ${body}</div>`;
    m.querySelectorAll('.rl-name,.rl-step').forEach(t=>{ const g=()=>{ if(t.tagName==='TEXTAREA'){t.style.height='auto';t.style.height=(t.scrollHeight+2)+'px';} }; g();
      t.addEventListener('input',()=>{ g(); const [i,f]=t.dataset.rl.split('|'); roles[+i][f]=t.value; }); });
    m.querySelectorAll('[data-rlamt]').forEach(b=>b.onclick=()=>{ const [i,v]=b.dataset.rlamt.split('|'); roles[+i].amount=roles[+i].amount===v?'':v; render(); });
    m.querySelectorAll('[data-rleng]').forEach(b=>b.onclick=()=>{ const [i,v]=b.dataset.rleng.split('|'); roles[+i].energy=roles[+i].energy===v?'':v; render(); });
    m.querySelector('#rlDone').onclick=()=>{
      const amL={'мало':'недостаточно','ок':'достаточно','много':'слишком много'};
      const enL={fill:'наполняет',drain:'истощает',mix:'по-разному'};
      const out=roles.filter(r=>r.name.trim()).map(r=>{
        const parts=[];
        if(r.amount) parts.push(amL[r.amount]);
        if(r.energy) parts.push(enL[r.energy]);
        const tail=parts.length?' ('+parts.join(', ')+')':'';
        const step=r.step.trim()?' → '+r.step.trim():'';
        return '• '+r.name.trim()+tail+step;
      });
      if(onDone && out.length) onDone('Мои роли в жизни:\n'+out.join('\n'));
      m.remove();
    };
  }
  document.body.appendChild(m);
  render();
}
function openCountertransf(onDone){
  const data={}; const chosen={};
  const m=document.createElement('div'); m.className='fs-modal';
  CT_FIELDS.forEach(f=>{ if(f.chips) chosen[f.k]=new Set(); });
  function render(){
    let i=0, body='';
    while(i<CT_FIELDS.length){
      const f=CT_FIELDS[i];
      // два «half»-поля подряд кладём рядом
      if(f.half && CT_FIELDS[i+1] && CT_FIELDS[i+1].half){
        const g=CT_FIELDS[i+1];
        body+=`<div class="ct-pair">
          <div class="ct-col"><div class="ct-lab"><span class="ct-num">${i+1}</span>${esc(f.q)}</div><div class="ct-hint">${esc(f.hint)}</div><textarea class="ct-area" data-ct="${f.k}" placeholder="${esc(f.ph)}">${esc(data[f.k]||'')}</textarea></div>
          <div class="ct-col"><div class="ct-lab"><span class="ct-num">${i+2}</span>${esc(g.q)}</div><div class="ct-hint">${esc(g.hint)}</div><textarea class="ct-area" data-ct="${g.k}" placeholder="${esc(g.ph)}">${esc(data[g.k]||'')}</textarea></div>
        </div>`;
        i+=2; continue;
      }
      const chipsHtml = f.chips ? `<div class="ct-chips">${f.chips.map(c=>`<button class="ct-chip ${chosen[f.k].has(c)?'on':''}" data-ctchip="${f.k}|${esc(c)}">${esc(c)}</button>`).join('')}</div>` : '';
      body+=`<div class="ct-f">
          <div class="ct-lab"><span class="ct-num">${i+1}</span>${esc(f.q)}</div>
          <div class="ct-hint">${esc(f.hint)}</div>
          ${chipsHtml}
          <textarea class="ct-area" data-ct="${f.k}" placeholder="${esc(f.ph||'своё…')}">${esc(data[f.k]||'')}</textarea>
        </div>`;
      i++;
    }
    m.innerHTML=`<div class="fs-bar"><span class="fs-title">Анализ контрпереноса</span>
